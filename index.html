<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<script>
(function () {
  try {
    var t = localStorage.getItem('tmall-theme');
    if (t !== 'light' && t !== 'dark') t = 'dark';
    document.documentElement.setAttribute('data-theme', t);
  } catch (e) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
})();
</script>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; -webkit-font-smoothing: antialiased; }
body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  overflow: hidden;
  height: 100vh;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, var(--scanline) 2px, var(--scanline) 4px);
  pointer-events: none;
  z-index: 9999;
}
.status-bar {
  height: var(--statusbar-h);
  background: var(--status-bar-bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 20px;
  font-size: 12px;
  position: relative;
  z-index: 100;
}
.status-bar::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0;
  width: 100%; height: 1px;
  background: linear-gradient(90deg, transparent, var(--red), transparent);
  opacity: 0.4;
}
.fetch-indicator { display: flex; align-items: center; gap: 8px; color: var(--green); }
.fetch-spinner {
  width: 14px; height: 14px;
  border: 2px solid transparent;
  border-top-color: var(--green);
  border-right-color: var(--green);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
.fetch-spinner.idle { animation: none; border-color: var(--text-dim); opacity: 0.4; }
.fetch-indicator.idle { color: var(--text-secondary); }
@keyframes spin { to { transform: rotate(360deg); } }
.fetch-text { letter-spacing: 0.5px; }
.status-divider { width: 1px; height: 16px; background: var(--border-light); }
.status-time { color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; font-size: 11px; }
.status-bar-right { display: flex; align-items: center; gap: 14px; margin-left: auto; }
.theme-toggle-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--bg-card); color: var(--text-secondary);
  font-size: 11px; font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer; transition: background 0.2s, border-color 0.2s, color 0.2s;
  flex-shrink: 0;
}
.theme-toggle-btn:hover {
  background: var(--bg-card-hover); border-color: var(--border-light); color: var(--text-primary);
}
.status-sources { display: flex; gap: 12px; }
.source-dot { display: flex; align-items: center; gap: 5px; color: var(--text-dim); font-size: 11px; }
.source-dot::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.app-layout { display: flex; height: calc(100vh - var(--statusbar-h)); }
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0;
  position: relative;
}
.sidebar::after {
  content: '';
  position: absolute; right: 0; top: 0;
  width: 1px; height: 100%;
  background: linear-gradient(180deg, var(--red) 0%, transparent 50%, var(--red) 100%);
  opacity: 0.15;
}
.sidebar-header { padding: 24px 20px 20px; border-bottom: 1px solid var(--border); }
.logo-area { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
.logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--red), var(--logo-accent));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 900; color: white;
  box-shadow: 0 4px 16px var(--red-glow);
}
.logo-text {
  font-size: 16px; font-weight: 700; letter-spacing: 1px;
  background: linear-gradient(135deg, var(--logo-text-start), var(--logo-text-end));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.logo-sub {
  font-size: 10px; color: var(--text-dim);
  letter-spacing: 2px; text-transform: uppercase;
  margin-top: 6px; padding-left: 48px;
}
.search-box { padding: 16px 20px; }
.search-input-wrap { position: relative; }
.search-input {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px 10px 36px;
  color: var(--text-primary);
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-input::placeholder { color: var(--text-dim); }
.search-input:focus { border-color: var(--red); box-shadow: 0 0 0 3px var(--red-glow); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 13px; }
.nav-tabs { flex: 1; padding: 8px 12px; display: flex; flex-direction: column; gap: 4px; }
.nav-tab {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; border-radius: 8px;
  cursor: pointer; transition: all 0.2s;
  position: relative; border: 1px solid transparent;
}
.nav-tab:hover { background: var(--bg-card); border-color: var(--border); }
.nav-tab.active {
  background: var(--bg-card);
  border-color: var(--red);
  box-shadow: 0 0 20px var(--red-glow), inset 0 0 20px var(--red-glow);
}
.nav-tab.active::before {
  content: '';
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 60%;
  background: var(--red);
  border-radius: 0 2px 2px 0;
}
.tab-icon {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
}
.tab-icon.home { background: var(--tab-icon-home-bg); color: var(--text-primary); }
.tab-icon.shelf { background: var(--tab-icon-shelf-bg); color: var(--amber); }
.tab-icon.score { background: var(--tab-icon-score-bg); color: var(--blue); }
.tab-icon.ship { background: var(--tab-icon-ship-bg); color: var(--green); }
.tab-icon.penalty { background: var(--tab-icon-penalty-bg); color: var(--red); }
.tab-icon.weekly { background: var(--tab-icon-weekly-bg); color: #a855f7; }
[data-theme="light"] .tab-icon.weekly { color: #7c3aed; }
.tab-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); transition: color 0.2s; }
.nav-tab.active .tab-label { color: var(--text-primary); }
.tab-count {
  margin-left: auto; font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-dim); background: var(--bg-deep);
  padding: 2px 8px; border-radius: 10px;
}
.sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); }
.data-sources-title { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
.data-source-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 11px; color: var(--text-secondary); }
.data-source-item .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); box-shadow: 0 0 4px var(--green); }
.main-content { flex: 1; overflow-y: auto; padding: 28px 32px; position: relative; }
.main-content::-webkit-scrollbar { width: 6px; }
.main-content::-webkit-scrollbar-track { background: transparent; }
.main-content::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
.section-header { margin-bottom: 28px; position: relative; }
.section-tag {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; font-family: 'JetBrains Mono', monospace;
  color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px;
}
.section-tag::before { content: ''; width: 8px; height: 8px; border: 2px solid var(--red); border-radius: 2px; display: inline-block; }
.section-title { font-size: 26px; font-weight: 900; letter-spacing: 1px; margin-bottom: 8px; }
.section-desc { color: var(--text-secondary); font-size: 13px; line-height: 1.6; }
.rules-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; margin-bottom: 36px; }
.rule-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 20px;
  position: relative; overflow: hidden;
  transition: all 0.3s; cursor: default;
}
.rule-card::before {
  content: '';
  position: absolute; top: 0; left: 0;
  width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--card-accent, var(--red)), transparent);
  opacity: 0; transition: opacity 0.3s;
}
.rule-card:hover {
  border-color: var(--border-light);
  background: var(--bg-card-hover);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px var(--card-shadow);
}
.rule-card:hover::before { opacity: 1; }
.card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
.card-title { font-size: 15px; font-weight: 700; line-height: 1.4; flex: 1; margin-right: 12px; }
.severity-badge { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 4px; letter-spacing: 1px; white-space: nowrap; flex-shrink: 0; }
.severity-badge.critical { background: var(--severity-critical-bg); color: var(--red); border: 1px solid var(--severity-critical-border); }
.severity-badge.warning { background: var(--severity-warning-bg); color: var(--amber); border: 1px solid var(--severity-warning-border); }
.severity-badge.info { background: var(--severity-info-bg); color: var(--blue); border: 1px solid var(--severity-info-border); }
.severity-badge.normal { background: var(--severity-normal-bg); color: var(--green); border: 1px solid var(--severity-normal-border); }
.card-body { font-size: 13px; color: var(--text-secondary); line-height: 1.8; margin-bottom: 14px; }
.card-body ul { list-style: none; padding: 0; }
.card-body li { padding: 3px 0; padding-left: 16px; position: relative; }
.card-body li::before { content: '›'; position: absolute; left: 2px; color: var(--red); font-weight: 700; }
.card-body .highlight { color: var(--red); font-weight: 500; }
.card-body .num { font-family: 'JetBrains Mono', monospace; color: var(--amber); font-weight: 500; }
.card-footer { display: flex; align-items: center; gap: 10px; padding-top: 12px; border-top: 1px solid var(--border); }
.date-badge { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text-dim); background: var(--bg-deep); padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); }
.card-tag { font-size: 10px; padding: 3px 8px; border-radius: 4px; background: var(--card-tag-bg); color: var(--text-dim); border: 1px solid var(--border); }
.card-link {
  font-size: 10px; font-family: 'JetBrains Mono', monospace;
  color: var(--blue); text-decoration: none;
  padding: 3px 8px; border-radius: 4px;
  border: 1px solid var(--card-link-border);
  background: var(--card-link-bg);
  margin-left: auto; white-space: nowrap;
  transition: all 0.2s; display: inline-flex; align-items: center; gap: 4px;
}
.card-link:hover { background: var(--card-link-hover-bg); border-color: var(--card-link-hover-border); color: var(--blue-hover); }
.change-link {
  font-size: 10px; font-family: 'JetBrains Mono', monospace;
  color: var(--blue); text-decoration: none;
  display: inline-flex; align-items: center; gap: 3px;
  margin-top: 4px; transition: color 0.2s;
}
.change-link:hover { color: var(--blue-hover); }
.timeline-section { margin-top: 8px; }
.timeline-header { font-size: 15px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
.timeline-header::before { content: ''; width: 14px; height: 2px; background: var(--red); }
.timeline { position: relative; padding-left: 28px; }
.timeline::before { content: ''; position: absolute; left: 8px; top: 4px; bottom: 4px; width: 1px; background: linear-gradient(180deg, var(--red), var(--border), transparent); }
.timeline-item { position: relative; padding-bottom: 20px; transition: opacity .2s; cursor: pointer; }
.timeline-item:hover { opacity: .8; }
.timeline-item:hover .timeline-text { color: var(--text-primary); }
.timeline-item::before {
  content: '';
  position: absolute; left: -24px; top: 6px;
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--bg-card); border: 2px solid var(--red);
}
.timeline-item:first-child::before { background: var(--red); box-shadow: 0 0 8px var(--red-glow-strong); }
.timeline-date { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text-dim); margin-bottom: 4px; }
.timeline-text { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
.timeline-text strong { color: var(--text-primary); font-weight: 500; }
.content-section { display: none; }
.content-section.active { display: block; }
.init-overlay {
  position: fixed; inset: 0; background: var(--bg-deep); z-index: 10000;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
}
.init-text { font-size: 14px; color: var(--text-dim); letter-spacing: 4px; text-transform: uppercase; }
.init-bar { width: 200px; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
.init-bar-fill { height: 100%; width: 0; background: var(--red); border-radius: 1px; }
.no-results { text-align: center; padding: 60px 20px; color: var(--text-dim); }
.no-results-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.3; }
.no-results-text { font-size: 15px; margin-bottom: 8px; color: var(--text-secondary); }
.no-results-sub { font-size: 12px; }
.fetch-panel {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; padding: 20px; margin-bottom: 24px;
  display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
}
.fetch-panel-title { font-size: 13px; font-weight: 700; color: var(--text-primary); white-space: nowrap; }
.fetch-stats { display: flex; gap: 16px; flex: 1; flex-wrap: wrap; }
.fetch-stat { display: flex; flex-direction: column; gap: 2px; }
.fetch-stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
.fetch-stat-value { font-size: 13px; font-family: 'JetBrains Mono', monospace; color: var(--green); }

.fetch-btn {
  padding: 8px 20px;

var WEEKLY_TAG_LABELS = {
  effectivePeriod: '效期',
  shopExperienceScore: '店铺体验分',
  shippingTimeliness: '发货时效',
  shippingViolationPenalty: '发货违规及处罚'
};

function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function getLastWeekRangeClient(ref) {
  var d = ref ? new Date(ref) : new Date();
  var day = d.getDay();
  var daysFromMonday = day === 0 ? 6 : day - 1;
  var thisMonday = new Date(d);
  thisMonday.setHours(0, 0, 0, 0);
  thisMonday.setDate(d.getDate() - daysFromMonday);
  var lastMonday = new Date(thisMonday);
  lastMonday.setDate(thisMonday.getDate() - 7);
  var lastSunday = new Date(lastMonday);
  lastSunday.setDate(lastMonday.getDate() + 6);
  lastSunday.setHours(23, 59, 59, 999);
  return { start: lastMonday, end: lastSunday };
}

function formatWeeklyRangeLabel(range) {
  function fmt(dt, withYear) {
    var y = dt.getFullYear();
    var m = dt.getMonth() + 1;
    var day = dt.getDate();
    return withYear ? y + '年' + m + '月' + day + '日' : m + '月' + day + '日';
  }
  return fmt(range.start, true) + ' — ' + fmt(range.end, false) + '（周一至周日）';
}

function isInLastWeekClient(iso, range) {
  if (!iso) return false;
  var t = new Date(iso);
  if (isNaN(t.getTime())) return false;
  return t >= range.start && t <= range.end;
}

var HIGHLIGHT_SECTION_KEYS = ['核心变化', '适用范围', '生效时间'];
var IMPACT_SECTION_KEYS = ['不利', '有利', '中性'];
var ACTION_SECTION_KEYS = ['运营组', '客服组', '物流组'];

var IMPACT_LEGACY = [
  { key: '不利', prefixes: ['对商家不利：', '不利：'] },
  { key: '有利', prefixes: ['对商家有利：', '有利：'] },
  { key: '中性', prefixes: ['中性（合规成本）：', '中性：'] }
];

function migrateFlatByLegacy(lines, legacyMap) {
  var structured = {};
  (lines || []).forEach(function (line) {
    var raw = String(line || '').trim();
    if (!raw) return;
    for (var i = 0; i < legacyMap.length; i++) {
      var entry = legacyMap[i];
      for (var j = 0; j < entry.prefixes.length; j++) {
        var prefix = entry.prefixes[j];
        if (raw.indexOf(prefix) === 0) {
          var body = raw.slice(prefix.length).replace(/^\d+[.、．]\s*/, '').trim();
          if (body) {
            if (!structured[entry.key]) structured[entry.key] = [];
            if (structured[entry.key].length < 3) structured[entry.key].push(body.slice(0, 120));
          }
          break;
        }
      }
    }
  });
  return structured;
}

function migrateHighlightsFromFlat(lines) {
  return migrateFlatByLegacy(
    (lines || []).map(function (line) {
      var raw = String(line || '').trim();
      if (!raw) return '';
      for (var i = 0; i < HIGHLIGHT_SECTION_KEYS.length; i++) {
        var key = HIGHLIGHT_SECTION_KEYS[i];
        var prefix = key + '：';
        if (raw.indexOf(prefix) === 0) return raw;
      }
      return raw;
    }).filter(Boolean),
    HIGHLIGHT_SECTION_KEYS.map(function (key) {
      return { key: key, prefixes: [key + '：'] };
    })
  );
}

function migrateImpactsFromFlat(lines) {
  return migrateFlatByLegacy(lines, IMPACT_LEGACY);
}

function migrateActionsFromFlat(lines) {
  return migrateFlatByLegacy(
    lines,
    ACTION_SECTION_KEYS.map(function (key) {
      return { key: key, prefixes: [key + '：'] };
    })
  );
}

function pickWeeklyHighlightsStructured(rule) {
  var ai = rule.aiSummary;
  if (ai && ai.highlightsStructured && typeof ai.highlightsStructured === 'object') {
    if (Object.keys(ai.highlightsStructured).length) return ai.highlightsStructured;
  }
  if (ai && Array.isArray(ai.highlights) && ai.highlights.length) {
    return migrateHighlightsFromFlat(ai.highlights);
  }
  if (ai && ai.highlight) {
    return { '核心变化': [String(ai.highlight).slice(0, 240)] };
  }
  var structured = {};
  if (rule.snippet) {
    structured['核心变化'] = [rule.snippet.slice(0, 240)];
  } else {
    var s = rule.summary || {};
    var keys = ['effectivePeriod', 'shopExperienceScore', 'shippingTimeliness', 'shippingViolationPenalty'];
    for (var i = 0; i < keys.length; i++) {
      if (s[keys[i]] && s[keys[i]] !== '未识别到明确描述') {
        structured['核心变化'] = [s[keys[i]].slice(0, 240)];
        break;
      }
    }
  }
  if (!structured['核心变化']) {
    structured['核心变化'] = [(rule.title || '规则更新') + '，请查阅原文了解变更要点与生效安排。'];
  }
  var tags = rule.tags || [];
  if (tags.length) {
    structured['适用范围'] = [tags.map(function (t) { return WEEKLY_TAG_LABELS[t] || t; }).join('、')];
  }
  var pub = rule.publishedAt || rule.lastSeenAt;
  if (pub) {
    var t = new Date(pub);
    if (!isNaN(t.getTime())) {
      var pad = function (n) { return String(n).padStart(2, '0'); };
      structured['生效时间'] = [t.getFullYear() + '年' + t.getMonth() + 1 + '月' + t.getDate() + '日（以原文为准）'];
    }
  }
  return structured;
}

function formatWeeklyStructuredBlocks(sectionKeys, structured) {
  if (!structured || typeof structured !== 'object') {
    return '<span class="weekly-cell-text">—</span>';
  }
  var html = '';
  sectionKeys.forEach(function (key) {
    var items = structured[key];
    if (!items || !items.length) return;
    html += '<div class="weekly-highlight-block">' +
      '<div class="weekly-highlight-label">' + escapeHtml(key) + '：</div>' +
      '<ol class="weekly-cell-list">';
    items.forEach(function (point) {
      html += '<li>' + escapeHtml(point) + '</li>';
    });
    html += '</ol></div>';
  });
  return html || '<span class="weekly-cell-text">—</span>';
}

function formatWeeklyHighlights(structured) {
  return formatWeeklyStructuredBlocks(HIGHLIGHT_SECTION_KEYS, structured);
}

function pickWeeklyImpactsStructured(rule) {
  var ai = rule.aiSummary;
  if (ai && ai.impactsStructured && typeof ai.impactsStructured === 'object') {
    if (Object.keys(ai.impactsStructured).length) return ai.impactsStructured;
  }
  if (ai && Array.isArray(ai.impacts) && ai.impacts.length) {
    return migrateImpactsFromFlat(ai.impacts);
  }
  var tags = rule.tags || [];
  var structured = {};
  if (tags.indexOf('effectivePeriod') >= 0) {
    structured['不利'] = (structured['不利'] || []).concat(['涉及效期与上架展示，可能影响 SKU 标注、下架与活动报名。']);
  }
  if (tags.indexOf('shopExperienceScore') >= 0) {
    structured['不利'] = (structured['不利'] || []).concat(['体验分关联搜索与活动资源，波动将影响流量与转化。']);
  }
  if (tags.indexOf('shippingTimeliness') >= 0) {
    structured['不利'] = (structured['不利'] || []).concat(['发货揽收超时可能触发体验分降权、赔付与投诉。']);
  }
  if (tags.indexOf('shippingViolationPenalty') >= 0) {
    structured['不利'] = (structured['不利'] || []).concat(['违规与赔付标准明确，增加售后成本与处罚风险。']);
  }
  if (!Object.keys(structured).length) {
    structured['中性'] = ['需结合类目评估履约与合规成本，建议查阅原文。'];
  }
  return structured;
}

function pickWeeklyActionsStructured(rule) {
  var ai = rule.aiSummary;
  if (ai && ai.actionsStructured && typeof ai.actionsStructured === 'object') {
    if (Object.keys(ai.actionsStructured).length) return ai.actionsStructured;
  }
  if (ai && Array.isArray(ai.actions) && ai.actions.length) {

  var tags = rule.tags || [];

    structured['客服组'] = ['压降响应、退款处理时长等高权重指标。'];
  }

    structured['物流组'] = ['更新发货模板与揽收 SLA，设置轨迹停滞预警。'];
  }
  if (tags.indexOf('shippingViolationPenalty') >= 0) {
    structured['客服组'] = ['梳理赔付场景，更新话术与自动同意策略。'];
    structured['运营组'] = (structured['运营组'] || []).concat(['对高投诉 SKU 建立熔断，避免重复违规。']);
  }
  if (!Object.keys(structured).length) {
    structured['运营组'] = ['组织共读原文并形成内部变更纪要。'];
    structured['客服组'] = ['生效当周按日复盘投诉、超时与赔付。'];
  }
  return structured;
}

function buildWeeklyReportClient(rules) {
  var range = getLastWeekRangeClient();
  var items = (Array.isArray(rules) ? rules : [])
    .filter(function (r) {
      return isInLastWeekClient(r.publishedAt, range) || isInLastWeekClient(r.lastSeenAt, range);
    })
    .sort(function (a, b) {
      return new Date(b.publishedAt || b.lastSeenAt || 0) - new Date(a.publishedAt || a.lastSeenAt || 0);
    })
    .map(function (rule) {
      var tags = rule.tags || [];
      var highlightsStructured = pickWeeklyHighlightsStructured(rule);
      var impactsStructured = pickWeeklyImpactsStructured(rule);
      var actionsStructured = pickWeeklyActionsStructured(rule);
      return {
        title: rule.title || '未命名规则',
        url: rule.url || '',
        publishedAt: rule.publishedAt || rule.lastSeenAt || null,
        highlightsStructured: highlightsStructured,
        impactsStructured: impactsStructured,
        actionsStructured: actionsStructured,
        aiGenerated: Boolean(
          rule.aiSummary && (
            (rule.aiSummary.highlightsStructured && Object.keys(rule.aiSummary.highlightsStructured).length) ||
            (rule.aiSummary.impactsStructured && Object.keys(rule.aiSummary.impactsStructured).length) ||
            (rule.aiSummary.actionsStructured && Object.keys(rule.aiSummary.actionsStructured).length) ||
            (Array.isArray(rule.aiSummary.highlights) && rule.aiSummary.highlights.length) ||
            (Array.isArray(rule.aiSummary.impacts) && rule.aiSummary.impacts.length) ||
            (Array.isArray(rule.aiSummary.actions) && rule.aiSummary.actions.length) ||
            rule.aiSummary.highlight
          )
        )
      };
    });
  return {
    range: { label: formatWeeklyRangeLabel(range) },
    total: items.length,
    items: items
  };
}

function updateWeeklyTabCount() {
  var el = document.getElementById('weeklyTabCount');
  if (el) el.textContent = String(weeklyReportData.total || 0);
}

async function loadWeeklyReport() {
  var preferApi = (location.hostname === 'localhost' || location.hostname === '127.0.0.1');
  if (preferApi) {
    try {
      var res = await fetch('/api/weekly');
      if (res.ok) {
        var data = await res.json();
        if (data && Array.isArray(data.items)) {
          weeklyReportData = data;
          if (!weeklyReportData.range || !weeklyReportData.range.label) {
            var r = getLastWeekRangeClient();
            weeklyReportData.range = { label: formatWeeklyRangeLabel(r) };
          }
          updateWeeklyTabCount();
          return;
        }
      }
    } catch (e) { /* fallback */ }
  }
  try {
    var rules = rulesJsonCache;
    if (!rules) {
      var base = getDataBasePath();
      var rulesRes = await fetch(base + 'rules.json');
      if (!rulesRes.ok) rulesRes = await fetch('./data/rules.json');
      if (rulesRes.ok) {
        rules = await rulesRes.json();
        rulesJsonCache = rules;
      }
    }
    if (Array.isArray(rules)) {
      weeklyReportData = buildWeeklyReportClient(rules);
      updateWeeklyTabCount();
    }
  } catch (e2) {
    console.warn('Weekly report load failed:', e2);
  }
}

function statusTimeValue(s) {
  if (!s || !s.lastFetchTime) return 0;
  var t = new Date(s.lastFetchTime).getTime();
  return isNaN(t) ? 0 : t;
}

function mergeBackendStatus(primary, secondary) {
  var a = primary || {};
  var b = secondary || {};
  var pick = statusTimeValue(a) >= statusTimeValue(b) ? a : b;
  var other = pick === a ? b : a;
  return Object.assign({}, backendStatus, other, pick, {
    fetchCount: Math.max(Number(a.fetchCount) || 0, Number(b.fetchCount) || 0),
    totalRules: Math.max(Number(a.totalRules) || 0, Number(b.totalRules) || 0)
  });
}

      ? [
          fetch('/api/status'),
          fetch('/api/rules'),
          fetch(basePath + 'timeline.json'),
          fetch(basePath + 'status.json'),
          fetch(basePath + 'rules.json')
        ]
      : [
          fetch(basePath + 'status.json'),
          fetch(basePath + 'timeline.json'),
          fetch(basePath + 'rules.json'),
          fetch('/api/status'),
          fetch('/api/rules')
        ];
    var idx = preferApi
      ? { apiStatus: 0, apiRules: 1, timeline: 2, localStatus: 3, rulesJson: 4 }
      : { localStatus: 0, timeline: 1, rulesJson: 2, apiStatus: 3, apiRules: 4 };
    var results = await Promise.allSettled(requests);

    var apiStatus = null;
    var localStatus = null;

    if (results[idx.apiStatus].status === 'fulfilled' && results[idx.apiStatus].value.ok) {
      apiStatus = await results[idx.apiStatus].value.json();
    }

    if (results[idx.localStatus].status === 'fulfilled' && results[idx.localStatus].value.ok) {
      localStatus = await results[idx.localStatus].value.json();
    }

    if (apiStatus || localStatus) {
      backendStatus = mergeBackendStatus(apiStatus, localStatus);
    }

    if (results[idx.apiRules].status === 'fulfilled' && results[idx.apiRules].value.ok) {
      var apiRules = await results[idx.apiRules].value.json();
      if (apiRules) {
        backendStatus = mergeBackendStatus(backendStatus, {
          lastFetchTime: apiRules.lastFetchTime,
          fetchCount: apiRules.fetchCount,
          newRulesCount: apiRules.newRulesCount,
          totalRules: apiRules.totalRules,
          sources: apiRules.sources
        });
      }
    }

    if (results[idx.timeline].status === 'fulfilled' && results[idx.timeline].value.ok) {
      var d = await results[idx.timeline].value.json();
      if (d && d.items && d.items.length > 0) timelineDataLive = d.items;
    }

    if (results[idx.rulesJson].status === 'fulfilled' && results[idx.rulesJson].value.ok) {
      var rulesArr = await results[idx.rulesJson].value.json();
      if (Array.isArray(rulesArr)) rulesJsonCache = rulesArr;
    }

    await loadCuratedData(basePath);
    await loadWeeklyReport();
  } catch (e) {
    console.warn('External data load failed, using embedded defaults:', e);
    await loadCuratedData(basePath);
    await loadWeeklyReport();
  }
}

// === RULE DETAIL LINKS（公告/抓取链接须带 #/rule/detail，否则会落到规则首页）===
function normalizeRuleDetailLink(raw) {
  if (!raw || typeof raw !== 'string') return '';
  var s = raw.trim();
  if (!s) return '';
  if (s.indexOf('#/rule/detail') !== -1) return s;
  try {
    var u = new URL(s);
    if (u.hostname.indexOf('rulechannel.tmall.com') === -1) return s;
    var ruleId = u.searchParams.get('ruleId') || '';
    var cId = u.searchParams.get('cId') || '';
    if (!ruleId && u.hash) {
      var hashBody = u.hash.replace(/^#\/?/, '');
      var qIdx = hashBody.indexOf('?');
      var hashQuery = qIdx >= 0 ? hashBody.slice(qIdx + 1) : '';
      var hp = new URLSearchParams(hashQuery);
      ruleId = hp.get('ruleId') || ruleId;
      cId = hp.get('cId') || cId;
    }
    if (!ruleId) return s;
    var params = new URLSearchParams({ type: 'detail', ruleId: ruleId });
    if (cId) params.set('cId', cId);
    var qs = params.toString();
    return 'https://rulechannel.tmall.com/?' + qs + '#/rule/detail?' + qs;
  } catch (e1) {
    return s;
  }
}

    gsap.fromTo('.weekly-table tbody tr', { opacity: 0, y: 10 }, { opacity: 1, y: 0, stagger: 0.05, duration: 0.35, ease: 'power2.out' });
    gsap.fromTo('.home-category-item', { opacity: 0, x: -12 }, { opacity: 1, x: 0, stagger: 0.06, duration: 0.35, ease: 'power2.out', delay: 0.2 });
    gsap.fromTo('.timeline-item', { opacity: 0, x: -10 }, { opacity: 1, x: 0, stagger: 0.08, duration: 0.3, ease: 'power2.out', delay: 0.4 });
    gsap.fromTo('.fetch-panel', { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.4, ease: 'power2.out', delay: 0.15 });
    gsap.fromTo('.rule-card', { opacity: 0, y: 20 }, { opacity: 1, y: 0, stagger: 0.06, duration: 0.4, ease: 'power2.out' });
    gsap.fromTo('.timeline-item', { opacity: 0, x: -10 }, { opacity: 1, x: 0, stagger: 0.08, duration: 0.3, ease: 'power2.out', delay: 0.3 });

  }
}

document.getElementById('navTabs').addEventListener('click', function(e) {
  const tab = e.target.closest('.nav-tab');
  if (tab) showTab(tab.dataset.tab);
});

function filterCards(query) {
  const cards = document.querySelectorAll('.rule-card');
  let visible = 0;
  cards.forEach(function(card) {
    const text = card.getAttribute('data-search').toLowerCase();
    if (text.includes(query)) { card.style.display = ''; visible++; }
    else { card.style.display = 'none'; }
  });
  let noRes = document.querySelector('.no-results');
  if (visible === 0 && !noRes) {
    const div = document.createElement('div');
    div.className = 'no-results';
    div.innerHTML = '<div class="no-results-icon">⌕</div><div class="no-results-text">未找到匹配的规则</div><div class="no-results-sub">尝试更换关键词或切换分类</div>';
    document.querySelector('.rules-grid').after(div);
  } else if (visible > 0 && noRes) { noRes.remove(); }
}

document.getElementById('searchInput').addEventListener('input', function(e) {
  const val = e.target.value.trim().toLowerCase();
  if (!val) { showTab(currentTab); return; }
  filterCards(val);
});

function setFetchActive(active) {
  var indicator = document.getElementById('fetchIndicator');
  var spinner = document.getElementById('fetchSpinner');
  var text = document.getElementById('fetchText');
  if (!indicator || !spinner || !text) return;
  if (active) {
    indicator.classList.remove('idle');
    spinner.classList.remove('idle');
    text.textContent = '正在抓取规则...';
  } else {
    indicator.classList.add('idle');
    spinner.classList.add('idle');
    var count = backendStatus ? backendStatus.fetchCount : 0;
    text.textContent = '规则自动抓取中 · 已执行' + count + '次';
  }
}

async function triggerManualFetch() {
  const btn = document.getElementById('manualFetchBtn');
  if (!btn) return;
  btn.classList.add('loading');
  btn.textContent = '抓取中...';
  setFetchActive(true);
  try {
    const response = await fetch('/api/crawl', { method: 'POST' });
    if (!response.ok) throw new Error('crawl failed');
    const result = await response.json();

    backendStatus = Object.assign({}, backendStatus, {
      lastFetchTime: result.timestamp || new Date().toISOString(),
      fetchCount: typeof result.fetchCount === 'number' ? result.fetchCount : ((backendStatus && backendStatus.fetchCount) || 0) + 1,
      newRulesCount: typeof result.newRulesCount === 'number' ? result.newRulesCount : 0,
      totalRules: typeof result.stored === 'number' ? result.stored : backendStatus.totalRules
    });

    await loadExternalData();
    await loadWeeklyReport();
    showTab(currentTab);
    updateStatusBar();
    btn.textContent = '完成! +' + (result.newRulesCount || 0) + '条';
  } catch (e) {
    btn.textContent = '抓取失败';
  } finally {
    btn.classList.remove('loading');
    setFetchActive(false);
    setTimeout(function() {
      var b = document.getElementById('manualFetchBtn');
      if (b) b.textContent = '立即抓取';
    }, 3000);
  }
}

function updateStatusBar() {
  if (backendStatus && backendStatus.lastFetchTime) {
    var t = new Date(backendStatus.lastFetchTime);
    var pad = function(n) { return String(n).padStart(2, '0'); };
    var str = t.getFullYear() + '-' + pad(t.getMonth()+1) + '-' + pad(t.getDate()) + ' ' + pad(t.getHours()) + ':' + pad(t.getMinutes()) + ':' + pad(t.getSeconds());
    document.getElementById('statusTime').textContent = '最近抓取: ' + str;
  }
  var total = 0;
  Object.values(RULES_DATA).forEach(function(s) { total += s.cards.length; });
  var fetched = backendStatus ? backendStatus.totalRules : 0;
  document.getElementById('ruleCount').textContent = '已收录: ' + total + '条基础 + ' + fetched + '条抓取';
  setFetchActive(false);
}

function updateClock() {
  var now = new Date();
  var pad = function(n) { return String(n).padStart(2, '0'); };
  if (!backendStatus) {
    var str = now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate()) + ' ' + pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
    document.getElementById('statusTime').textContent = '当前时间: ' + str;
    var total = 0;
    Object.values(RULES_DATA).forEach(function(s) { total += s.cards.length; });
    document.getElementById('ruleCount').textContent = '已收录规则: ' + total + '条';
  }
}

// === THEME ===
var THEME_STORAGE_KEY = 'tmall-theme';

function getTheme() {
  var t = document.documentElement.getAttribute('data-theme');
  return t === 'light' ? 'light' : 'dark';
}

function updateThemeToggleLabel() {
  var btn = document.getElementById('themeToggleBtn');
  if (!btn) return;
  var isLight = getTheme() === 'light';
  btn.textContent = isLight ? '☀ 白天' : '🌙 黑夜';
  btn.setAttribute('aria-label', isLight ? '当前为白天模式，点击切换为黑夜' : '当前为黑夜模式，点击切换为白天');
}

function applyTheme(theme) {
  var next = theme === 'light' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  try {
    localStorage.setItem(THEME_STORAGE_KEY, next);
  } catch (e) { /* ignore */ }
  updateThemeToggleLabel();
}

function toggleTheme() {
  applyTheme(getTheme() === 'light' ? 'dark' : 'light');
}

function initThemeToggle() {
  updateThemeToggleLabel();
  var btn = document.getElementById('themeToggleBtn');
  if (btn) btn.addEventListener('click', toggleTheme);
}

// === BOOT ===
function bootComplete() {
  var overlay = document.getElementById('initOverlay');
  overlay.style.display = 'none';
  showTab('home');
  updateStatusBar();
  updateClock();
  setInterval(updateClock, 1000);
}

function boot() {
  var fill = document.getElementById('initBarFill');
  var overlay = document.getElementById('initOverlay');
  var dataReady = loadExternalData();

  if (typeof gsap !== 'undefined') {
    gsap.to(fill, {
      width: '100%', duration: 1.2, ease: 'power2.inOut',
      onComplete: function() {
        dataReady.then(function() {
          gsap.to(overlay, {
            opacity: 0, duration: 0.4,
            onComplete: bootComplete
          });
        });
      }
    });
  } else {
    // GSAP not loaded — skip animation, show content immediately
    fill.style.width = '100%';
    dataReady.then(function() {
      setTimeout(function() {
        overlay.style.transition = 'opacity 0.3s';
        overlay.style.opacity = '0';
        setTimeout(bootComplete, 350);
      }, 400);
    });
  }
}

window.addEventListener('DOMContentLoaded', function () {
  initThemeToggle();
  boot();
});
</script>
