<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天猫规则监控中心</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
/* === CSS VARIABLES === */
:root {
  --red: #FF0036;
  --red-dim: #cc002b;
  --red-glow: rgba(255, 0, 54, 0.15);
  --red-glow-strong: rgba(255, 0, 54, 0.35);
  --bg-deep: #08090d;
  --bg-panel: #0e1017;
  --bg-card: #131620;
  --bg-card-hover: #181c28;
  --border: #1e2233;
  --border-light: #2a2f44;
  --text-primary: #e8eaf0;
  --text-secondary: #8b90a5;
  --text-dim: #555a70;
  --green: #00e87b;
  --amber: #ffb800;
  --blue: #3b82f6;
  --sidebar-w: 260px;
  --header-h: 56px;
  --statusbar-h: 40px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; -webkit-font-smoothing: antialiased; }
body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  overflow: hidden;
  height: 100vh;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events: none;
  z-index: 9999;
}
.status-bar {
  height: var(--statusbar-h);
  background: linear-gradient(90deg, #0a0c12 0%, #101320 50%, #0a0c12 100%);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 20px;
  font-size: 12px;
  position: relative;
  z-index: 100;
}
.status-bar::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0;
  width: 100%; height: 1px;
  background: linear-gradient(90deg, transparent, var(--red), transparent);
  opacity: 0.4;
}
.fetch-indicator { display: flex; align-items: center; gap: 8px; color: var(--green); }
.fetch-spinner {
  width: 14px; height: 14px;
  border: 2px solid transparent;
  border-top-color: var(--green);
  border-right-color: var(--green);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
.fetch-spinner.idle { animation: none; border-color: var(--text-dim); opacity: 0.4; }
.fetch-indicator.idle { color: var(--text-secondary); }
@keyframes spin { to { transform: rotate(360deg); } }
.fetch-text { letter-spacing: 0.5px; }
.status-divider { width: 1px; height: 16px; background: var(--border-light); }
.status-time { color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; font-size: 11px; }
.status-sources { display: flex; gap: 12px; margin-left: auto; }
.source-dot { display: flex; align-items: center; gap: 5px; color: var(--text-dim); font-size: 11px; }
.source-dot::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.app-layout { display: flex; height: calc(100vh - var(--statusbar-h)); }
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0;
  position: relative;
}
.sidebar::after {
  content: '';
  position: absolute; right: 0; top: 0;
  width: 1px; height: 100%;
  background: linear-gradient(180deg, var(--red) 0%, transparent 50%, var(--red) 100%);
  opacity: 0.15;
}
.sidebar-header { padding: 24px 20px 20px; border-bottom: 1px solid var(--border); }
.logo-area { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
.logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--red), #ff3366);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 900; color: white;
  box-shadow: 0 4px 16px var(--red-glow);
}
.logo-text {
  font-size: 16px; font-weight: 700; letter-spacing: 1px;
  background: linear-gradient(135deg, #fff, #ccc);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.logo-sub {
  font-size: 10px; color: var(--text-dim);
  letter-spacing: 2px; text-transform: uppercase;
  margin-top: 6px; padding-left: 48px;
}
.search-box { padding: 16px 20px; }
.search-input-wrap { position: relative; }
.search-input {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px 10px 36px;
  color: var(--text-primary);
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-input::placeholder { color: var(--text-dim); }
.search-input:focus { border-color: var(--red); box-shadow: 0 0 0 3px var(--red-glow); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 13px; }
.nav-tabs { flex: 1; padding: 8px 12px; display: flex; flex-direction: column; gap: 4px; }
.nav-tab {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; border-radius: 8px;
  cursor: pointer; transition: all 0.2s;
  position: relative; border: 1px solid transparent;
}
.nav-tab:hover { background: var(--bg-card); border-color: var(--border); }
.nav-tab.active {
  background: var(--bg-card);
  border-color: var(--red);
  box-shadow: 0 0 20px var(--red-glow), inset 0 0 20px var(--red-glow);
}
.nav-tab.active::before {
  content: '';
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 60%;
  background: var(--red);
  border-radius: 0 2px 2px 0;
}
.tab-icon {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
}
.tab-icon.home { background: rgba(255, 255, 255, 0.08); color: var(--text-primary); }
.tab-icon.shelf { background: rgba(255, 184, 0, 0.12); color: var(--amber); }
.tab-icon.score { background: rgba(59, 130, 246, 0.12); color: var(--blue); }
.tab-icon.ship { background: rgba(0, 232, 123, 0.12); color: var(--green); }
.tab-icon.penalty { background: rgba(255, 0, 54, 0.12); color: var(--red); }
.tab-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); transition: color 0.2s; }
.nav-tab.active .tab-label { color: var(--text-primary); }
.tab-count {
  margin-left: auto; font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-dim); background: var(--bg-deep);
  padding: 2px 8px; border-radius: 10px;
}
.sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); }
.data-sources-title { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
.data-source-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 11px; color: var(--text-secondary); }
.data-source-item .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); box-shadow: 0 0 4px var(--green); }
.main-content { flex: 1; overflow-y: auto; padding: 28px 32px; position: relative; }
.main-content::-webkit-scrollbar { width: 6px; }
.main-content::-webkit-scrollbar-track { background: transparent; }
.main-content::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
.section-header { margin-bottom: 28px; position: relative; }
.section-tag {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; font-family: 'JetBrains Mono', monospace;
  color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px;
}
.section-tag::before { content: ''; width: 8px; height: 8px; border: 2px solid var(--red); border-radius: 2px; display: inline-block; }
.section-title { font-size: 26px; font-weight: 900; letter-spacing: 1px; margin-bottom: 8px; }
.section-desc { color: var(--text-secondary); font-size: 13px; line-height: 1.6; }
.rules-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; margin-bottom: 36px; }
.rule-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 20px;
  position: relative; overflow: hidden;
  transition: all 0.3s; cursor: default;
}
.rule-card::before {
  content: '';
  position: absolute; top: 0; left: 0;
  width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--card-accent, var(--red)), transparent);
  opacity: 0; transition: opacity 0.3s;
}
.rule-card:hover {
  border-color: var(--border-light);
  background: var(--bg-card-hover);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.rule-card:hover::before { opacity: 1; }
.card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
.card-title { font-size: 15px; font-weight: 700; line-height: 1.4; flex: 1; margin-right: 12px; }
.severity-badge { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 4px; letter-spacing: 1px; white-space: nowrap; flex-shrink: 0; }
.severity-badge.critical { background: rgba(255,0,54,0.15); color: var(--red); border: 1px solid rgba(255,0,54,0.3); }
.severity-badge.warning { background: rgba(255,184,0,0.12); color: var(--amber); border: 1px solid rgba(255,184,0,0.25); }
.severity-badge.info { background: rgba(59,130,246,0.12); color: var(--blue); border: 1px solid rgba(59,130,246,0.25); }
.severity-badge.normal { background: rgba(0,232,123,0.10); color: var(--green); border: 1px solid rgba(0,232,123,0.2); }
.card-body { font-size: 13px; color: var(--text-secondary); line-height: 1.8; margin-bottom: 14px; }
.card-body ul { list-style: none; padding: 0; }
.card-body li { padding: 3px 0; padding-left: 16px; position: relative; }
.card-body li::before { content: '›'; position: absolute; left: 2px; color: var(--red); font-weight: 700; }
.card-body .highlight { color: var(--red); font-weight: 500; }
.card-body .num { font-family: 'JetBrains Mono', monospace; color: var(--amber); font-weight: 500; }
.card-footer { display: flex; align-items: center; gap: 10px; padding-top: 12px; border-top: 1px solid var(--border); }
.date-badge { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text-dim); background: var(--bg-deep); padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); }
.card-tag { font-size: 10px; padding: 3px 8px; border-radius: 4px; background: rgba(255,255,255,0.04); color: var(--text-dim); border: 1px solid var(--border); }
.card-link {
  font-size: 10px; font-family: 'JetBrains Mono', monospace;
  color: var(--blue); text-decoration: none;
  padding: 3px 8px; border-radius: 4px;
  border: 1px solid rgba(59, 130, 246, 0.2);
  background: rgba(59, 130, 246, 0.06);
  margin-left: auto; white-space: nowrap;
  transition: all 0.2s; display: inline-flex; align-items: center; gap: 4px;
}
.card-link:hover { background: rgba(59, 130, 246, 0.15); border-color: rgba(59, 130, 246, 0.4); color: #6ba6ff; }
.change-link {
  font-size: 10px; font-family: 'JetBrains Mono', monospace;
  color: var(--blue); text-decoration: none;
  display: inline-flex; align-items: center; gap: 3px;
  margin-top: 4px; transition: color 0.2s;
}
.change-link:hover { color: #6ba6ff; }
.timeline-section { margin-top: 8px; }
.timeline-header { font-size: 15px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
.timeline-header::before { content: ''; width: 14px; height: 2px; background: var(--red); }
.timeline { position: relative; padding-left: 28px; }
.timeline::before { content: ''; position: absolute; left: 8px; top: 4px; bottom: 4px; width: 1px; background: linear-gradient(180deg, var(--red), var(--border), transparent); }
.timeline-item { position: relative; padding-bottom: 20px; transition: opacity .2s; cursor: pointer; }
.timeline-item:hover { opacity: .8; }
.timeline-item:hover .timeline-text { color: var(--text-primary); }
.timeline-item::before {
  content: '';
  position: absolute; left: -24px; top: 6px;
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--bg-card); border: 2px solid var(--red);
}
.timeline-item:first-child::before { background: var(--red); box-shadow: 0 0 8px var(--red-glow-strong); }
.timeline-date { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text-dim); margin-bottom: 4px; }
.timeline-text { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
.timeline-text strong { color: var(--text-primary); font-weight: 500; }
.content-section { display: none; }
.content-section.active { display: block; }
.init-overlay {
  position: fixed; inset: 0; background: var(--bg-deep); z-index: 10000;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
}
.init-text { font-size: 14px; color: var(--text-dim); letter-spacing: 4px; text-transform: uppercase; }
.init-bar { width: 200px; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
.init-bar-fill { height: 100%; width: 0; background: var(--red); border-radius: 1px; }
.no-results { text-align: center; padding: 60px 20px; color: var(--text-dim); }
.no-results-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.3; }
.no-results-text { font-size: 15px; margin-bottom: 8px; color: var(--text-secondary); }
.no-results-sub { font-size: 12px; }
.fetch-panel {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; padding: 20px; margin-bottom: 24px;
  display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
}
.fetch-panel-title { font-size: 13px; font-weight: 700; color: var(--text-primary); white-space: nowrap; }
.fetch-stats { display: flex; gap: 16px; flex: 1; flex-wrap: wrap; }
.fetch-stat { display: flex; flex-direction: column; gap: 2px; }
.fetch-stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
.fetch-stat-value { font-size: 13px; font-family: 'JetBrains Mono', monospace; color: var(--green); }
.fetch-stat-value.error { color: var(--red); }
.fetch-stat-value.pending { color: var(--amber); }
.fetch-btn {
  padding: 8px 20px;
  background: linear-gradient(135deg, var(--red), var(--red-dim));
  color: #fff; border: none; border-radius: 6px;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
  position: relative; overflow: hidden;
}
.fetch-btn:hover { box-shadow: 0 4px 16px var(--red-glow-strong); transform: translateY(-1px); }
.fetch-btn:active { transform: translateY(0); }
.fetch-btn.loading { pointer-events: none; opacity: 0.7; }
.fetch-btn.loading::after {
  content: ''; position: absolute; top: 50%; right: 12px;
  width: 14px; height: 14px; margin-top: -7px;
  border: 2px solid transparent; border-top-color: #fff;
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
.source-status-row { width: 100%; display: flex; gap: 12px; padding-top: 12px; border-top: 1px solid var(--border); flex-wrap: wrap; }
.source-chip { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-secondary); background: var(--bg-deep); padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); }
.source-chip .chip-dot { width: 6px; height: 6px; border-radius: 50%; }
.source-chip .chip-dot.online { background: var(--green); box-shadow: 0 0 4px var(--green); }
.source-chip .chip-dot.error { background: var(--red); box-shadow: 0 0 4px var(--red); }
.source-chip .chip-dot.unknown { background: var(--text-dim); }
.fetched-section { margin-top: 28px; }
.changes-panel {
  margin-top: 32px;
  border: 1px solid rgba(255, 0, 54, 0.25);
  border-radius: 12px;
  background: linear-gradient(135deg, rgba(255, 0, 54, 0.04) 0%, rgba(59, 130, 246, 0.03) 100%);
  overflow: hidden;
}
.changes-panel-header {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  background: rgba(255, 0, 54, 0.06);
}
.changes-panel-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--red-glow-strong);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.changes-panel-title { font-size: 15px; font-weight: 700; color: var(--text-primary); }
.changes-panel-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.changes-panel-badge {
  margin-left: auto; font-size: 10px; font-family: 'JetBrains Mono', monospace;
  background: var(--red-glow); color: var(--red);
  padding: 3px 10px; border-radius: 4px; letter-spacing: 0.5px; white-space: nowrap;
}
.changes-list { padding: 12px 16px; }
.change-item {
  display: flex; gap: 14px;
  padding: 14px 16px; border: 1px solid var(--border);
  border-radius: 8px; margin-bottom: 10px;
  background: var(--bg-card); transition: all 0.2s;
  position: relative; overflow: hidden;
}
.change-item:hover { border-color: var(--border-light); background: var(--bg-card-hover); }
.change-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
.change-item.type-new::before { background: var(--green); }
.change-item.type-modify::before { background: var(--amber); }
.change-item.type-remove::before { background: var(--red); }
.change-type-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; padding: 2px 8px; border-radius: 3px; white-space: nowrap; height: fit-content; margin-top: 2px; }
.change-type-tag.new { background: rgba(0, 232, 123, 0.15); color: var(--green); }
.change-type-tag.modify { background: rgba(255, 184, 0, 0.15); color: var(--amber); }
.change-type-tag.remove { background: rgba(255, 0, 54, 0.15); color: var(--red); }
.change-content { flex: 1; min-width: 0; }
.change-title { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
.change-detail { font-size: 12px; color: var(--text-secondary); line-height: 1.7; }
.change-detail .old { text-decoration: line-through; color: var(--text-dim); background: rgba(255, 0, 54, 0.08); padding: 1px 4px; border-radius: 2px; }
.change-detail .new-val { color: var(--green); background: rgba(0, 232, 123, 0.08); padding: 1px 4px; border-radius: 2px; font-weight: 500; }
.change-date { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--text-dim); margin-top: 8px; }
.analysis-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
.analysis-card { border: 1px solid var(--border); border-radius: 12px; background: var(--bg-card); overflow: hidden; transition: border-color 0.2s; }
.analysis-card:hover { border-color: var(--border-light); }
.analysis-card-header { display: flex; align-items: center; gap: 10px; padding: 14px 18px; border-bottom: 1px solid var(--border); }
.analysis-card-header.impact { background: linear-gradient(135deg, rgba(255, 184, 0, 0.06) 0%, rgba(255, 0, 54, 0.04) 100%); }
.analysis-card-header.strategy { background: linear-gradient(135deg, rgba(0, 232, 123, 0.06) 0%, rgba(59, 130, 246, 0.04) 100%); }
.analysis-card-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.analysis-card-icon.impact { background: rgba(255, 184, 0, 0.2); }
.analysis-card-icon.strategy { background: rgba(0, 232, 123, 0.2); }
.analysis-card-title { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.analysis-card-body { padding: 16px 18px; }
.analysis-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(30, 34, 51, 0.6); }
.analysis-item:last-child { border-bottom: none; padding-bottom: 4px; }
.analysis-bullet { width: 6px; height: 6px; border-radius: 50%; margin-top: 7px; flex-shrink: 0; }
.analysis-bullet.high { background: var(--red); box-shadow: 0 0 6px var(--red-glow); }
.analysis-bullet.medium { background: var(--amber); }
.analysis-bullet.low { background: var(--blue); }
.analysis-bullet.action { background: var(--green); box-shadow: 0 0 6px rgba(0, 232, 123, 0.3); }
.analysis-item-content { flex: 1; min-width: 0; }
.analysis-item-title { font-size: 12.5px; font-weight: 600; color: var(--text-primary); margin-bottom: 3px; }
.analysis-item-desc { font-size: 11.5px; color: var(--text-secondary); line-height: 1.65; }
.analysis-item-desc .warn { color: var(--amber); font-weight: 500; }
.analysis-item-desc .good { color: var(--green); font-weight: 500; }
.analysis-item-desc .num { font-family: 'JetBrains Mono', monospace; color: var(--blue); }
.fetched-section-header { font-size: 15px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
.fetched-section-header .badge { font-size: 11px; font-family: 'JetBrains Mono', monospace; background: var(--red-glow); color: var(--red); padding: 2px 8px; border-radius: 4px; }
.fetched-rule-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 16px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: 8px;
  margin-bottom: 8px; transition: all 0.2s;
}

async function loadExternalData() {
  var basePath = './data/';
  try {
    // Static hosting (GitHub Pages) has no backend API. Prefer local JSON there.
    var preferApi = (location.hostname === 'localhost' || location.hostname === '127.0.0.1');
    var requests = preferApi
      ? [
          fetch('/api/status'),
          fetch('/api/rules'),
          fetch(basePath + 'timeline.json'),
          fetch(basePath + 'status.json'),
          fetch(basePath + 'scraped.json')
        ]
      : [
          fetch(basePath + 'status.json'),
          fetch(basePath + 'scraped.json'),
          fetch(basePath + 'timeline.json'),
          fetch('/api/status'),
          fetch('/api/rules')
        ];
    var idx = preferApi
      ? { apiStatus: 0, apiRules: 1, timeline: 2, localStatus: 3, localRules: 4 }
      : { localStatus: 0, localRules: 1, timeline: 2, apiStatus: 3, apiRules: 4 };
    var results = await Promise.allSettled(requests);

    var statusLoaded = false;
    if (results[idx.apiStatus].status === 'fulfilled' && results[idx.apiStatus].value.ok) {
      var apiStatus = await results[idx.apiStatus].value.json();
      if (apiStatus && (apiStatus.lastFetchTime || typeof apiStatus.fetchCount === 'number')) {
        backendStatus = Object.assign({}, backendStatus, apiStatus);
        statusLoaded = true;
      }
    }

    var rulesLoaded = false;
    if (results[idx.apiRules].status === 'fulfilled' && results[idx.apiRules].value.ok) {
      var apiRules = await results[idx.apiRules].value.json();
      if (apiRules && apiRules.categorized) {
        fetchedRulesData = apiRules;
        rulesLoaded = true;
        backendStatus = Object.assign({}, backendStatus, {
          lastFetchTime: apiRules.lastFetchTime || backendStatus.lastFetchTime,
          fetchCount: typeof apiRules.fetchCount === 'number' ? apiRules.fetchCount : backendStatus.fetchCount,
          newRulesCount: typeof apiRules.newRulesCount === 'number' ? apiRules.newRulesCount : backendStatus.newRulesCount,
          sources: apiRules.sources || backendStatus.sources
        });
      }
    }

    if (!statusLoaded && results[idx.localStatus].status === 'fulfilled' && results[idx.localStatus].value.ok) {
      var localStatus = await results[idx.localStatus].value.json();
      if (localStatus && (localStatus.lastFetchTime || typeof localStatus.fetchCount === 'number')) {
        backendStatus = Object.assign({}, backendStatus, localStatus);
      }
    }

    if (!rulesLoaded && results[idx.localRules].status === 'fulfilled' && results[idx.localRules].value.ok) {
      var localRules = await results[idx.localRules].value.json();
      if (localRules && localRules.categorized) {
        fetchedRulesData = localRules;
      }
    }

    if (results[idx.timeline].status === 'fulfilled' && results[idx.timeline].value.ok) {
      var d = await results[idx.timeline].value.json();
      if (d && d.items && d.items.length > 0) timelineDataLive = d.items;
    }
  } catch (e) {
    console.warn('External data load failed, using embedded defaults:', e);
  }
}

  if (typeof gsap !== 'undefined') {
    gsap.fromTo('.home-stat-card', { opacity: 0, y: 15 }, { opacity: 1, y: 0, stagger: 0.08, duration: 0.4, ease: 'power2.out' });
    gsap.fromTo('.home-category-item', { opacity: 0, x: -12 }, { opacity: 1, x: 0, stagger: 0.06, duration: 0.35, ease: 'power2.out', delay: 0.2 });
    gsap.fromTo('.timeline-item', { opacity: 0, x: -10 }, { opacity: 1, x: 0, stagger: 0.08, duration: 0.3, ease: 'power2.out', delay: 0.4 });
    gsap.fromTo('.fetch-panel', { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.4, ease: 'power2.out', delay: 0.15 });
    gsap.fromTo('.rule-card', { opacity: 0, y: 20 }, { opacity: 1, y: 0, stagger: 0.06, duration: 0.4, ease: 'power2.out' });
    gsap.fromTo('.timeline-item', { opacity: 0, x: -10 }, { opacity: 1, x: 0, stagger: 0.08, duration: 0.3, ease: 'power2.out', delay: 0.3 });
    gsap.fromTo('.fetched-rule-item', { opacity: 0, x: -8 }, { opacity: 1, x: 0, stagger: 0.04, duration: 0.3, ease: 'power2.out', delay: 0.2 });
    gsap.fromTo('.fetch-panel', { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.4, ease: 'power2.out' });
    gsap.fromTo('.changes-panel', { opacity: 0, y: 15 }, { opacity: 1, y: 0, duration: 0.5, ease: 'power2.out', delay: 0.25 });
    gsap.fromTo('.change-item', { opacity: 0, x: -12 }, { opacity: 1, x: 0, stagger: 0.06, duration: 0.35, ease: 'power2.out', delay: 0.4 });
    gsap.fromTo('.analysis-card', { opacity: 0, y: 20 }, { opacity: 1, y: 0, stagger: 0.15, duration: 0.5, ease: 'power2.out', delay: 0.6 });
    gsap.fromTo('.analysis-item', { opacity: 0, x: -10 }, { opacity: 1, x: 0, stagger: 0.05, duration: 0.3, ease: 'power2.out', delay: 0.8 });
  }
}

document.getElementById('navTabs').addEventListener('click', function(e) {
  const tab = e.target.closest('.nav-tab');
  if (tab) showTab(tab.dataset.tab);
});

function filterCards(query) {
  const cards = document.querySelectorAll('.rule-card');
  let visible = 0;
  cards.forEach(function(card) {
    const text = card.getAttribute('data-search').toLowerCase();
    if (text.includes(query)) { card.style.display = ''; visible++; }
    else { card.style.display = 'none'; }
  });
  let noRes = document.querySelector('.no-results');
  if (visible === 0 && !noRes) {
    const div = document.createElement('div');
    div.className = 'no-results';
    div.innerHTML = '<div class="no-results-icon">⌕</div><div class="no-results-text">未找到匹配的规则</div><div class="no-results-sub">尝试更换关键词或切换分类</div>';
    document.querySelector('.rules-grid').after(div);
  } else if (visible > 0 && noRes) { noRes.remove(); }
}

document.getElementById('searchInput').addEventListener('input', function(e) {
  const val = e.target.value.trim().toLowerCase();
  if (!val) { showTab(currentTab); return; }
  filterCards(val);
});

function setFetchActive(active) {
  var indicator = document.getElementById('fetchIndicator');
  var spinner = document.getElementById('fetchSpinner');
  var text = document.getElementById('fetchText');
  if (!indicator || !spinner || !text) return;
  if (active) {
    indicator.classList.remove('idle');
    spinner.classList.remove('idle');
    text.textContent = '正在抓取规则...';
  } else {
    indicator.classList.add('idle');
    spinner.classList.add('idle');
    var count = backendStatus ? backendStatus.fetchCount : 0;
    text.textContent = '规则自动抓取中 · 已执行' + count + '次';
  }
}

async function triggerManualFetch() {
  const btn = document.getElementById('manualFetchBtn');
  if (!btn) return;
  btn.classList.add('loading');
  btn.textContent = '抓取中...';
  setFetchActive(true);
  try {
    const response = await fetch('/api/crawl', { method: 'POST' });
    if (!response.ok) throw new Error('crawl failed');
    const result = await response.json();

    backendStatus = Object.assign({}, backendStatus, {
      lastFetchTime: result.timestamp || new Date().toISOString(),
      fetchCount: typeof result.fetchCount === 'number' ? result.fetchCount : ((backendStatus && backendStatus.fetchCount) || 0) + 1,
      newRulesCount: typeof result.newRulesCount === 'number' ? result.newRulesCount : 0,
      totalRules: typeof result.stored === 'number' ? result.stored : backendStatus.totalRules
    });

    await loadExternalData();
    showTab(currentTab);
    updateStatusBar();
    btn.textContent = '完成! +' + (result.newRulesCount || 0) + '条';
  } catch (e) {
    btn.textContent = '抓取失败';
  } finally {
    btn.classList.remove('loading');
    setFetchActive(false);
    setTimeout(function() {
      var b = document.getElementById('manualFetchBtn');
      if (b) b.textContent = '立即抓取';
    }, 3000);
  }
}

function updateStatusBar() {
  if (backendStatus && backendStatus.lastFetchTime) {
    var t = new Date(backendStatus.lastFetchTime);
    var pad = function(n) { return String(n).padStart(2, '0'); };
    var str = t.getFullYear() + '-' + pad(t.getMonth()+1) + '-' + pad(t.getDate()) + ' ' + pad(t.getHours()) + ':' + pad(t.getMinutes()) + ':' + pad(t.getSeconds());
    document.getElementById('statusTime').textContent = '最近抓取: ' + str;
  }
  var total = 0;
  Object.values(RULES_DATA).forEach(function(s) { total += s.cards.length; });
  var fetched = backendStatus ? backendStatus.totalRules : 0;
  document.getElementById('ruleCount').textContent = '已收录: ' + total + '条基础 + ' + fetched + '条抓取';
  setFetchActive(false);
}

function updateClock() {
  var now = new Date();
  var pad = function(n) { return String(n).padStart(2, '0'); };
  if (!backendStatus) {
    var str = now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate()) + ' ' + pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
    document.getElementById('statusTime').textContent = '当前时间: ' + str;
    var total = 0;
    Object.values(RULES_DATA).forEach(function(s) { total += s.cards.length; });
    document.getElementById('ruleCount').textContent = '已收录规则: ' + total + '条';
  }
}

// === BOOT ===
function bootComplete() {
  var overlay = document.getElementById('initOverlay');
  overlay.style.display = 'none';
  showTab('home');
  updateStatusBar();
  updateClock();
  setInterval(updateClock, 1000);
}

function boot() {
  var fill = document.getElementById('initBarFill');
  var overlay = document.getElementById('initOverlay');
  var dataReady = loadExternalData();

  if (typeof gsap !== 'undefined') {
    gsap.to(fill, {
      width: '100%', duration: 1.2, ease: 'power2.inOut',
      onComplete: function() {
        dataReady.then(function() {
          gsap.to(overlay, {
            opacity: 0, duration: 0.4,
            onComplete: bootComplete
          });
        });
      }
    });
  } else {
    // GSAP not loaded — skip animation, show content immediately
    fill.style.width = '100%';
    dataReady.then(function() {
      setTimeout(function() {
        overlay.style.transition = 'opacity 0.3s';
        overlay.style.opacity = '0';
        setTimeout(bootComplete, 350);
      }, 400);
    });
  }
}

window.addEventListener('DOMContentLoaded', boot);
</script>
