name: Crawl Tmall Rules

on:
  workflow_dispatch:
  schedule:
    # 09:00 Asia/Shanghai == 01:00 UTC
    - cron: "0 1 * * *"

permissions:
  contents: write

concurrency:
  group: crawl-tmall-rules
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync latest main
        run: git pull --ff-only origin main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install --no-audit --no-fund

      - name: Crawl And Generate data/*.json
        run: node scripts/gh-crawl.mjs
        env:
          TZ: Asia/Shanghai
          DATA_DIR: data
          ENABLE_LLM_SUMMARY: ${{ secrets.DEEPSEEK_API_KEY != '' && 'true' || 'false' }}
          # 仓库 Secret 可命名为 DEEPSEEK_API_KEY 或 DEEPSEEK（你当前是 DEEPSEEK）
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY || secrets.DEEPSEEK }}
          LLM_BASE_URL: https://api.deepseek.com
          LLM_MODEL: deepseek-chat

      - name: Sync Curated Category Cards
        run: node scripts/sync-curated-cards.mjs
        env:
          TZ: Asia/Shanghai
          DATA_DIR: data
          ENABLE_LLM_SUMMARY: ${{ secrets.DEEPSEEK_API_KEY != '' && 'true' || 'false' }}
          ENABLE_CURATED_AUTO_PUBLISH: "true"
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY || secrets.DEEPSEEK }}
          LLM_BASE_URL: https://api.deepseek.com
          LLM_MODEL: deepseek-chat
          LLM_MAX_CURATED_SOURCES_PER_RUN: "2"
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}

      - name: Commit Updated Data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json public/data/curated-*.json
          git commit -m "chore(data): update rules and curated category cards"
          for attempt in 1 2 3 4 5; do
            echo "Push attempt ${attempt}..."
            git fetch origin main
            git pull --rebase origin main
            if git push origin main; then
              echo "Push succeeded."
              exit 0
            fi
            echo "Push rejected, retrying in $((attempt * 3))s..."
            sleep $((attempt * 3))
          done
          echo "Push failed after 5 attempts."
          exit 1
