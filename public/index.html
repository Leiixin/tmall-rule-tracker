<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<script>
(function () {
  try {
    var t = localStorage.getItem('tmall-theme');
    if (t !== 'light' && t !== 'dark') t = 'light';
    document.documentElement.setAttribute('data-theme', t);
    var d = localStorage.getItem('tmall-density');
    if (d !== 'compact' && d !== 'comfortable') d = 'compact';
    document.documentElement.setAttribute('data-density', d);
  } catch (e) {
    document.documentElement.setAttribute('data-theme', 'light');
    document.documentElement.setAttribute('data-density', 'compact');
  }
})();
</script>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; -webkit-font-smoothing: antialiased; }
body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  overflow: hidden;
  height: 100vh;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, var(--scanline) 2px, var(--scanline) 4px);
  pointer-events: none;
  z-index: 9999;
}
.status-bar {
  height: var(--statusbar-h);
  background: var(--status-bar-bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 20px;
  font-size: 12px;
  position: relative;
  z-index: 100;
}
.status-bar::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0;
  width: 100%; height: 1px;
  background: linear-gradient(90deg, transparent, var(--red), transparent);
  opacity: 0.4;
}
.fetch-indicator { display: flex; align-items: center; gap: 8px; color: var(--green); }
.fetch-spinner {
  width: 14px; height: 14px;
  border: 2px solid transparent;
  border-top-color: var(--green);
  border-right-color: var(--green);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
.fetch-spinner.idle { animation: none; border-color: var(--text-dim); opacity: 0.4; }
.fetch-indicator.idle { color: var(--text-secondary); }
@keyframes spin { to { transform: rotate(360deg); } }
.fetch-text { letter-spacing: 0.5px; }
.status-divider { width: 1px; height: 16px; background: var(--border-light); }
.status-time { color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; font-size: 11px; }
.status-bar-right { display: flex; align-items: center; gap: 14px; margin-left: auto; }
.theme-toggle-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--bg-card); color: var(--text-secondary);
  font-size: 11px; font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer; transition: background 0.2s, border-color 0.2s, color 0.2s;
  flex-shrink: 0;
}
.theme-toggle-btn:hover {
  background: var(--bg-card-hover); border-color: var(--border-light); color: var(--text-primary);
}
.app-layout { display: flex; height: calc(100vh - var(--statusbar-h)); min-height: 0; }
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0;
  position: relative;
  min-height: 0;
  overflow: hidden;
}
.sidebar::after {
  content: '';
  position: absolute; right: 0; top: 0;
  width: 1px; height: 100%;
  background: linear-gradient(180deg, var(--red) 0%, transparent 50%, var(--red) 100%);
  opacity: 0.15;
}
.sidebar-header { padding: 24px 20px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.logo-area { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
.logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--red), var(--logo-accent));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 900; color: white;
  box-shadow: 0 4px 16px var(--red-glow);
}
.logo-text {
  font-size: 16px; font-weight: 700; letter-spacing: 1px;
  background: linear-gradient(135deg, var(--logo-text-start), var(--logo-text-end));

}
.logo-sub {
  font-size: 10px; color: var(--text-dim);
  letter-spacing: 2px; text-transform: uppercase;
  margin-top: 6px; padding-left: 48px;
}
.search-box { padding: 16px 20px; flex-shrink: 0; }
.search-input-wrap { position: relative; }
.search-input {
  width: 100%;

  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px 10px 36px;
  color: var(--text-primary);
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-input::placeholder { color: var(--text-dim); }
.search-input:focus { border-color: var(--red); box-shadow: 0 0 0 3px var(--red-glow); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 13px; }
.nav-tabs {
  flex: 1; min-height: 0; padding: 8px 12px;
  display: flex; flex-direction: column; gap: 4px;
  overflow-y: auto; overscroll-behavior: contain;
}
.nav-tabs::-webkit-scrollbar { width: 6px; }
.nav-tabs::-webkit-scrollbar-track { background: transparent; }
.nav-tabs::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
.nav-tab {
  display: flex; align-items: center; gap: 12px;

  position: relative; border: 1px solid transparent;
}
.nav-tab:hover { background: var(--bg-card); border-color: var(--border); }
.nav-tab.active {
  background: var(--bg-card);

  box-shadow: 0 0 20px var(--red-glow), inset 0 0 20px var(--red-glow);
}
.nav-tab.active::before {
  content: '';

  background: var(--red);
  border-radius: 0 2px 2px 0;
}
.tab-icon {
  width: 32px; height: 32px; border-radius: 8px;

}
.tab-icon.home { background: var(--tab-icon-home-bg); color: var(--text-primary); }
.tab-icon.shelf { background: var(--tab-icon-shelf-bg); color: var(--amber); }
.tab-icon.score { background: var(--tab-icon-score-bg); color: var(--blue); }
.tab-icon.ship { background: var(--tab-icon-ship-bg); color: var(--green); }
.tab-icon.penalty { background: var(--tab-icon-penalty-bg); color: var(--red); }
.tab-icon.intl_expiry { background: rgba(255, 184, 0, 0.12); color: var(--amber); }
.tab-icon.intl_logistics { background: rgba(0, 232, 123, 0.12); color: var(--green); }
.tab-icon.intl_qual { background: rgba(59, 130, 246, 0.12); color: var(--blue); }
.tab-icon.intl_penalty { background: rgba(255, 0, 54, 0.12); color: var(--red); }

.platform-select-wrap {
  padding: 0 16px 12px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
  flex-shrink: 0;
}
.platform-select-label {
  display: block;
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 6px;
}
.platform-select {
  width: 100%;
  padding: 8px 10px;
  font-size: 12px;
  font-weight: 600;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg-secondary);
  color: var(--text-primary);
  cursor: pointer;
}
.platform-select:focus {
  outline: none;
  border-color: var(--red);
}
.platform-select option:disabled {
  color: var(--text-dim);
}
.tab-icon.weekly { background: var(--tab-icon-weekly-bg); color: #a855f7; }
[data-theme="light"] .tab-icon.weekly { color: #7c3aed; }
.tab-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); transition: color 0.2s; }
.nav-tab.active .tab-label { color: var(--text-primary); }
.tab-count {
  margin-left: auto; font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-dim); background: var(--bg-deep);
  padding: 2px 8px; border-radius: 10px;
}
.main-content { flex: 1; min-height: 0; overflow-y: auto; padding: 28px 32px; position: relative; }
.main-content::-webkit-scrollbar { width: 6px; }
.main-content::-webkit-scrollbar-track { background: transparent; }
.main-content::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
.section-header { margin-bottom: 28px; position: relative; }
.section-tag {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; font-family: 'JetBrains Mono', monospace;
  color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px;
}
.section-tag::before { content: ''; width: 8px; height: 8px; border: 2px solid var(--red); border-radius: 2px; display: inline-block; }
.section-title { font-size: 26px; font-weight: 900; letter-spacing: 1px; margin-bottom: 8px; }
.section-desc { color: var(--text-secondary); font-size: 13px; line-height: 1.6; }
.rules-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; margin-bottom: 36px; }
.rule-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 20px;
  position: relative; overflow: hidden;
  transition: all 0.3s; cursor: default;
}
.rule-card::before {
  content: '';
  position: absolute; top: 0; left: 0;
  width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--card-accent, var(--red)), transparent);
  opacity: 0; transition: opacity 0.3s;
}
.rule-card:hover {
  border-color: var(--border-light);
  background: var(--bg-card-hover);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px var(--card-shadow);
}
.rule-card:hover::before { opacity: 1; }
.card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
.card-title { font-size: 15px; font-weight: 700; line-height: 1.4; flex: 1; margin-right: 12px; }
.severity-badge { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 4px; letter-spacing: 1px; white-space: nowrap; flex-shrink: 0; }
.severity-badge.critical { background: var(--severity-critical-bg); color: var(--red); border: 1px solid var(--severity-critical-border); }
.severity-badge.warning { background: var(--severity-warning-bg); color: var(--amber); border: 1px solid var(--severity-warning-border); }
.severity-badge.info { background: var(--severity-info-bg); color: var(--blue); border: 1px solid var(--severity-info-border); }
.severity-badge.normal { background: var(--severity-normal-bg); color: var(--green); border: 1px solid var(--severity-normal-border); }
.card-body { font-size: 13px; color: var(--text-secondary); line-height: 1.8; margin-bottom: 14px; }
.card-body ul { list-style: none; padding: 0; }
.card-body li { padding: 3px 0; padding-left: 16px; position: relative; }
.card-body li::before { content: '›'; position: absolute; left: 2px; color: var(--red); font-weight: 700; }
.card-body .highlight,
.weekly-cell-list .highlight { color: var(--red); font-weight: 500; }
.card-body .num,
.weekly-cell-list .num { color: var(--amber); font-weight: 500; }
.card-penalty-heading {
  font-size: 13px; font-weight: 600; color: var(--text-primary);
  margin: 12px 0 8px; line-height: 1.5;
}
.card-penalty-note {
  font-size: 12px; color: var(--text-secondary);
  margin: 8px 0 0; line-height: 1.6;
}
.card-penalty-table-wrap {
  width: 100%; overflow-x: auto; margin-top: 4px;
  border: 1px solid var(--border); border-radius: 8px;
  background: var(--bg-deep);
}
table.card-penalty-table {
  width: 100%; min-width: 280px; border-collapse: collapse;
}
.card-penalty-table th,
.card-penalty-table td {
  padding: 8px 10px; font-size: 12px; line-height: 1.55;
  vertical-align: top; text-align: left;
  border-bottom: 1px solid var(--border);
  word-wrap: break-word; overflow-wrap: anywhere;
  color: var(--text-secondary);
}
.card-penalty-table th {
  background: var(--bg-panel); color: var(--text-primary);
  font-weight: 600; white-space: nowrap;
}
.card-penalty-table tbody tr:last-child td { border-bottom: none; }
.card-penalty-table tbody tr:hover td { background: var(--bg-card-hover); }
.card-score-section { margin-bottom: 24px; }
.card-score-heading {
  font-size: 15px; font-weight: 600; color: var(--text-primary);
  margin: 0 0 6px; line-height: 1.5;
}
.card-score-subheading {
  font-size: 12px; color: var(--text-secondary);
  margin: 0 0 10px; line-height: 1.6;
}
.card-score-footnote {
  font-size: 12px; color: var(--text-secondary);
  margin: 10px 0 0; line-height: 1.6;
}
.card-metric-note {
  display: block; margin-top: 6px;
  font-size: 11px; color: var(--text-dim); line-height: 1.6;
}
.card-score-table-wrap--rule.card-penalty-table-wrap {
  overflow-x: hidden;
}
.card-score-table-wrap--rule .card-penalty-table {
  table-layout: fixed;
  width: 100%;
  min-width: 0;
  max-width: 100%;
}
.card-score-table-wrap--rule .card-penalty-table th,
.card-score-table-wrap--rule .card-penalty-table td {
  padding: 6px 8px;
  font-size: 11px;
  white-space: normal;
  box-sizing: border-box;
}
.card-score-table-wrap--rule .card-penalty-table th:nth-child(1),
.card-score-table-wrap--rule .card-penalty-table td:nth-child(1),
.card-score-table-wrap--rule .card-penalty-table th:nth-child(2),

.card-score-table-wrap--rule .card-penalty-table th:nth-child(3),
.card-score-table-wrap--rule .card-penalty-table td:nth-child(3),
.card-score-table-wrap--rule .card-score-td-def {

  min-width: 0;
  overflow-wrap: anywhere;
  line-break: anywhere;
  word-break: break-all;
}
.card-score-table-wrap--rule .card-penalty-table tbody td {

.card-score-table-wrap--rule .card-penalty-table th:nth-child(4),
.card-score-table-wrap--rule .card-penalty-table td:nth-child(4),
.card-score-table-wrap--rule .card-score-td-period {

  min-width: 0;
  overflow-wrap: normal;
  word-break: normal;

function registerClientPlatformMatchers(manifest) {
  clientPlatformMatchers = {};
  (manifest.platforms || []).forEach(function (p) {
    var scope = p.weeklyScope || p.id;
    if (scope === 'tmall' || scope === 'intl') return;
    var wm = p.weeklyMatchers || {};
    clientPlatformMatchers[scope] = {
      titlePatterns: (wm.titlePatterns || []).map(function (pat) { return new RegExp(pat, 'i'); }),
      urlPatterns: (wm.urlPatterns || []).map(function (pat) { return new RegExp(pat, 'i'); })
    };
  });
}

function registerClientRuleHosts(manifest) {
  var set = {};
  clientRuleHosts.forEach(function (h) { set[h] = true; });
  (manifest.platforms || []).forEach(function (p) {
    (p.ruleHosts || []).forEach(function (h) {
      if (h) set[h] = true;
    });
  });
  clientRuleHosts = Object.keys(set);
}

function matchesClientRegisteredScope(rule, weeklyScope) {
  var matchers = clientPlatformMatchers[weeklyScope];
  if (!matchers) return false;
  var title = (rule && rule.title) || '';
  var url = (rule && rule.url) || '';
  return matchers.titlePatterns.some(function (re) { return re.test(title); }) ||
    matchers.urlPatterns.some(function (re) { return re.test(url); });
}

async function loadPlatformsManifest() {
  try {
    var base = getDataBasePath();
    var res = await fetch(base + 'platforms.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var manifest = await parseJsonFromResponse(res);
    registerClientPlatformMatchers(manifest);
    registerClientRuleHosts(manifest);
    platformsManifestList = (manifest.platforms || []).slice().sort(function (a, b) {
      return (b.priority || 0) - (a.priority || 0);
    });
    PLATFORM_CONFIG = {};
    platformsManifestList.forEach(function (entry) {
      PLATFORM_CONFIG[entry.id] = buildPlatformRuntimeConfig(entry);
    });
    return true;
  } catch (e) {
    console.warn('platforms.json load failed, using inline fallback:', e);
    applyInlinePlatformConfigFallback();
    return false;
  }
}

function getPlatformConfig() {
  return PLATFORM_CONFIG[currentPlatform] || PLATFORM_CONFIG.tmall;
}

function isPlatformEnabled(platformId) {

}

function getRulesDataFallback() {

function hasCuratedLink(url) {
  return String(url || '').trim().length > 0;
}

function filterCuratedSection(section, fallback) {
  var base = section || fallback;
  var cards = (base.cards || []).filter(function (c) {
    return hasCuratedLink(c.link);
  });
  return Object.assign({}, base, { cards: cards });
}

function applyCuratedCardsPayload(data) {
  var keys = getCuratedCategoryKeys();
  var fallback = getRulesDataFallback();
  if (!data) {
    var empty = {};
    keys.forEach(function (k) { empty[k] = fallback[k]; });
    RULES_DATA = empty;
    return;
  }
  var next = {};
  keys.forEach(function (k) {
    next[k] = filterCuratedSection(data[k], fallback[k]);
  });
  RULES_DATA = next;
}

async function loadVisitStats() {
  var recorded = sessionStorage.getItem(VISIT_SESSION_KEY);
  var method = recorded ? 'GET' : 'POST';
  try {
    var res = await fetch(BSZ_API, {
      method: method,
      credentials: 'include',
      headers: { 'x-bsz-referer': location.href }
    });
    if (!res.ok) return;
    var json = await res.json();
    if (!json || !json.success || !json.data) return;
    if (!recorded && method === 'POST') {
      sessionStorage.setItem(VISIT_SESSION_KEY, '1');
    }
    updateVisitStatsDisplay(json.data.site_pv, json.data.site_uv);
  } catch (e) {
    console.warn('Visit stats load failed:', e);
  }
}

function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function getLastWeekRangeClient(ref) {
  var d = ref ? new Date(ref) : new Date();
  var day = d.getDay();
  var daysFromMonday = day === 0 ? 6 : day - 1;
  var thisMonday = new Date(d);
  thisMonday.setHours(0, 0, 0, 0);
  thisMonday.setDate(d.getDate() - daysFromMonday);
  var lastMonday = new Date(thisMonday);
  lastMonday.setDate(thisMonday.getDate() - 7);
  var lastSunday = new Date(lastMonday);
  lastSunday.setDate(lastMonday.getDate() + 6);
  lastSunday.setHours(23, 59, 59, 999);
  return { start: lastMonday, end: lastSunday };
}

function formatWeeklyRangeLabel(range) {
  function fmt(dt, withYear) {
    var y = dt.getFullYear();
    var m = dt.getMonth() + 1;
    var day = dt.getDate();
    return withYear ? y + '年' + m + '月' + day + '日' : m + '月' + day + '日';
  }
  return fmt(range.start, true) + ' — ' + fmt(range.end, false) + '（周一至周日）';
}

function isInLastWeekClient(iso, range) {
  if (!iso) return false;
  var t = new Date(iso);
  if (isNaN(t.getTime())) return false;
  return t >= range.start && t <= range.end;
}

function formatChineseDateFromIso(iso) {
  if (!iso) return '';
  var t = new Date(iso);
  if (isNaN(t.getTime())) return '';
  return t.getFullYear() + '年' + (t.getMonth() + 1) + '月' + t.getDate() + '日（以原文为准）';
}

function isDouyinAnnouncementLikeSourceClient(rule) {
  if (!rule) return false;
  if (rule.weeklyChannel === 'announcement') return true;
  return /规则动态|公示通知|首页推荐/.test(String(rule.source || ''));
}

function isIntlAnnouncementLikeSourceClient(rule) {
  if (!rule) return false;
  if (rule.weeklyChannel === 'announcement') return true;
  return /规则公示/.test(String(rule.source || ''));
}

function isRuleInWeeklyWindowClient(rule, range, weeklyScope) {
  if (!ruleMatchesWeeklyScope(rule, weeklyScope)) return false;
  if (weeklyScope === 'douyin') {
    if (!isDouyinAnnouncementLikeSourceClient(rule)) return false;
    return isInLastWeekClient(rule.publishedAt, range);
  }
  if (weeklyScope === 'intl') {
    if (!isIntlAnnouncementLikeSourceClient(rule)) return false;
    return isInLastWeekClient(rule.publishedAt, range);
  }
  return isInLastWeekClient(rule.publishedAt, range) ||
    isInLastWeekClient(rule.lastSeenAt, range);
}

var HIGHLIGHT_SECTION_KEYS = ['核心变化', '适用范围', '生效时间'];
var IMPACT_SECTION_KEYS = ['不利', '有利', '中性'];
var ACTION_SECTION_KEYS = ['运营组', '客服组', '物流组'];

var INLINE_HIGHLIGHT_PLACEHOLDER = '\x00';

function sanitizeInlineHighlightHtml(text) {
  var input = String(text || '');
  if (!input) return '';

  var spans = [];
  var withoutSpans = input.replace(
    /<span class="(num|highlight)">([\s\S]*?)<\/span>/gi,
    function (_full, cls, inner) {
      var idx = spans.length;
      spans.push({ cls: cls.toLowerCase(), inner: escapeHtml(inner) });
      return INLINE_HIGHLIGHT_PLACEHOLDER + idx + INLINE_HIGHLIGHT_PLACEHOLDER;
    }
  );

  var safe = escapeHtml(withoutSpans);
  spans.forEach(function (sp, idx) {
    var token = INLINE_HIGHLIGHT_PLACEHOLDER + idx + INLINE_HIGHLIGHT_PLACEHOLDER;
    safe = safe.split(token).join(
      '<span class="' + sp.cls + '">' + sp.inner + '</span>'
    );
  });
  return safe;
}

function formatWeeklyPointHtml(text) {
  return sanitizeInlineHighlightHtml(text);
}

var IMPACT_LEGACY = [
  { key: '不利', prefixes: ['对商家不利：', '不利：'] },
  { key: '有利', prefixes: ['对商家有利：', '有利：'] },
  { key: '中性', prefixes: ['中性（合规成本）：', '中性：'] }
];

function migrateFlatByLegacy(lines, legacyMap) {
  var structured = {};
  (lines || []).forEach(function (line) {
    var raw = String(line || '').trim();
    if (!raw) return;
    for (var i = 0; i < legacyMap.length; i++) {
      var entry = legacyMap[i];
      for (var j = 0; j < entry.prefixes.length; j++) {
        var prefix = entry.prefixes[j];
        if (raw.indexOf(prefix) === 0) {
          var body = raw.slice(prefix.length).replace(/^\d+[.、．]\s*/, '').trim();
          if (body) {
            if (!structured[entry.key]) structured[entry.key] = [];
            if (structured[entry.key].length < 3) structured[entry.key].push(body.slice(0, 120));
          }
          break;
        }
      }
    }
  });
  return structured;
}

function migrateHighlightsFromFlat(lines) {
  return migrateFlatByLegacy(
    (lines || []).map(function (line) {
      var raw = String(line || '').trim();
      if (!raw) return '';
      for (var i = 0; i < HIGHLIGHT_SECTION_KEYS.length; i++) {
        var key = HIGHLIGHT_SECTION_KEYS[i];
        var prefix = key + '：';
        if (raw.indexOf(prefix) === 0) return raw;
      }
      return raw;
    }).filter(Boolean),
    HIGHLIGHT_SECTION_KEYS.map(function (key) {
      return { key: key, prefixes: [key + '：'] };
    })
  );
}

function migrateImpactsFromFlat(lines) {
  return migrateFlatByLegacy(lines, IMPACT_LEGACY);
}

function migrateActionsFromFlat(lines) {
  return migrateFlatByLegacy(
    lines,
    ACTION_SECTION_KEYS.map(function (key) {
      return { key: key, prefixes: [key + '：'] };
    })
  );
}

function pickWeeklyHighlightsStructured(rule, weeklyScope) {

function formatWeeklyStructuredBlocks(sectionKeys, structured) {

function getRulePlatformScope(rule) {
  var scope = rule && rule.platformScope;
  if (typeof scope === 'string' && scope.length > 0) return scope;
  var title = (rule && rule.title) || '';
  var url = (rule && rule.url) || '';
  var keys = Object.keys(clientPlatformMatchers);
  for (var i = 0; i < keys.length; i++) {
    if (matchesClientRegisteredScope(rule, keys[i])) return keys[i];
  }
  if (/rule\.tmall\.hk/i.test(url)) return 'intl';
  if (/天猫\/天猫国际|天猫国际.*天猫/.test(title)) return 'both';
  if (/天猫国际/.test(title)) return 'intl';
  return 'tmall';
}

function ruleMatchesWeeklyScope(rule, weeklyScope) {
  if (rule && rule.platformScope === weeklyScope) return true;
  if (weeklyScope === 'tmall' || weeklyScope === 'intl') {
    var ps = getRulePlatformScope(rule);
    if (weeklyScope === 'intl') return ps === 'intl' || ps === 'both';
    return ps === 'tmall' || ps === 'both';
  }
  return matchesClientRegisteredScope(rule, weeklyScope);
}

function filterWeeklyReportForPlatform(report, weeklyScope) {
  if (!report || !Array.isArray(report.items)) return report;
  report.items = report.items.filter(function (item) {
    return ruleMatchesWeeklyScope(
      { title: item.title, url: item.url, platformScope: item.platformScope },
      weeklyScope
    );
  });
  report.total = report.items.length;
  return report;
}

function buildWeeklyReportClient(rules, weeklyScope) {
  weeklyScope = weeklyScope || getPlatformConfig().weeklyScope;
  var range = getLastWeekRangeClient();
  var items = (Array.isArray(rules) ? rules : [])
    .filter(function (r) {
      return isRuleInWeeklyWindowClient(r, range, weeklyScope);
    })
    .sort(function (a, b) {
      return new Date(b.publishedAt || b.lastSeenAt || 0) - new Date(a.publishedAt || a.lastSeenAt || 0);
    })
    .map(function (rule) {
      var tags = rule.tags || [];
      var highlightsStructured = pickWeeklyHighlightsStructured(rule, weeklyScope);
      var impactsStructured = pickWeeklyImpactsStructured(rule, weeklyScope);
      var actionsStructured = pickWeeklyActionsStructured(rule, weeklyScope);
      return {
        title: rule.title || '未命名规则',
        url: rule.url || '',
        publishedAt: rule.publishedAt || rule.lastSeenAt || null,
        highlightsStructured: highlightsStructured,
        impactsStructured: impactsStructured,
        actionsStructured: actionsStructured,
        aiGenerated: Boolean(
          rule.aiSummary && (
            (rule.aiSummary.highlightsStructured && Object.keys(rule.aiSummary.highlightsStructured).length) ||
            (rule.aiSummary.impactsStructured && Object.keys(rule.aiSummary.impactsStructured).length) ||
            (rule.aiSummary.actionsStructured && Object.keys(rule.aiSummary.actionsStructured).length) ||
            (Array.isArray(rule.aiSummary.highlights) && rule.aiSummary.highlights.length) ||
            (Array.isArray(rule.aiSummary.impacts) && rule.aiSummary.impacts.length) ||
            (Array.isArray(rule.aiSummary.actions) && rule.aiSummary.actions.length) ||
            rule.aiSummary.highlight
          )
        )
      };
    });
  return {
    range: { label: formatWeeklyRangeLabel(range) },
    total: items.length,
    items: items
  };
}

function updateWeeklyTabCount() {

async function loadWeeklyReport() {
  var weeklyScope = getPlatformConfig().weeklyScope;
  var preferApi = (location.hostname === 'localhost' || location.hostname === '127.0.0.1');
  if (preferApi) {
    try {
      var res = await fetch('/api/weekly?platform=' + encodeURIComponent(weeklyScope));
      if (res.ok) {
        var data = await res.json();
        if (data && Array.isArray(data.items)) {
          weeklyReportData = filterWeeklyReportForPlatform(data, weeklyScope);
          if (!weeklyReportData.range || !weeklyReportData.range.label) {
            var r = getLastWeekRangeClient();
            weeklyReportData.range = { label: formatWeeklyRangeLabel(r) };
          }
          updateWeeklyTabCount();
          return;
        }
      }
    } catch (e) { /* fallback */ }
  }
  try {
    var rules = getRulesJsonCache();
    if (!rules) {
      var base = getPlatformDataPath();
      var rulesRes = await fetch(base + 'rules.json');
      if (!rulesRes.ok) rulesRes = await fetch(getDataBasePath() + 'rules.json');
      if (rulesRes.ok) {
        rules = await rulesRes.json();
        rulesJsonCacheByPlatform[currentPlatform] = rules;
      }
    }
    if (Array.isArray(rules)) {
      weeklyReportData = buildWeeklyReportClient(rules, weeklyScope);
      updateWeeklyTabCount();
    }
  } catch (e2) {
    console.warn('Weekly report load failed:', e2);
  }
}

function statusTimeValue(s) {
  if (!s || !s.lastFetchTime) return 0;
  var t = new Date(s.lastFetchTime).getTime();
  return isNaN(t) ? 0 : t;
}

function mergeBackendStatus(primary, secondary) {
  var a = primary || {};
  var b = secondary || {};
  var pick = statusTimeValue(a) >= statusTimeValue(b) ? a : b;
  var other = pick === a ? b : a;
  return Object.assign({}, backendStatus, other, pick, {
    fetchCount: Math.max(Number(a.fetchCount) || 0, Number(b.fetchCount) || 0),
    totalRules: Math.max(Number(a.totalRules) || 0, Number(b.totalRules) || 0)
  });
}

async function loadExternalData() {
  var basePath = getPlatformDataPath();
  var useApi = currentPlatform === 'tmall' &&
    (location.hostname === 'localhost' || location.hostname === '127.0.0.1');
  try {
    var requests = useApi
      ? [
          fetch('/api/status'),
          fetch('/api/rules'),
          fetch(basePath + 'timeline.json'),
          fetch(basePath + 'status.json'),
          fetch(basePath + 'rules.json')
        ]
      : [
          fetch(basePath + 'status.json'),
          fetch(basePath + 'timeline.json'),
          fetch(basePath + 'rules.json'),
          fetch('/api/status'),
          fetch('/api/rules')
        ];
    var idx = useApi
      ? { apiStatus: 0, apiRules: 1, timeline: 2, localStatus: 3, rulesJson: 4 }
      : { localStatus: 0, timeline: 1, rulesJson: 2, apiStatus: 3, apiRules: 4 };
    var results = await Promise.allSettled(requests);

    var apiStatus = null;
    var localStatus = null;

    if (results[idx.apiStatus].status === 'fulfilled' && results[idx.apiStatus].value.ok) {
      apiStatus = await results[idx.apiStatus].value.json();
    }

    if (results[idx.localStatus].status === 'fulfilled' && results[idx.localStatus].value.ok) {
      localStatus = await results[idx.localStatus].value.json();
    }

    if (apiStatus || localStatus) {
      backendStatus = mergeBackendStatus(apiStatus, localStatus);
    }

    if (results[idx.apiRules].status === 'fulfilled' && results[idx.apiRules].value.ok) {
      var apiRules = await results[idx.apiRules].value.json();
      if (apiRules) {
        backendStatus = mergeBackendStatus(backendStatus, {
          lastFetchTime: apiRules.lastFetchTime,
          fetchCount: apiRules.fetchCount,
          newRulesCount: apiRules.newRulesCount,
          totalRules: apiRules.totalRules,
          sources: apiRules.sources
        });
      }
    }

    if (results[idx.timeline].status === 'fulfilled' && results[idx.timeline].value.ok) {
      var d = await results[idx.timeline].value.json();
      if (d && d.items && d.items.length > 0) {
        timelineDataByPlatform[currentPlatform] = d.items;
      } else {
        timelineDataByPlatform[currentPlatform] = null;
      }
    }

    if (results[idx.rulesJson].status === 'fulfilled' && results[idx.rulesJson].value.ok) {
      var rulesArr = await results[idx.rulesJson].value.json();
      if (Array.isArray(rulesArr)) rulesJsonCacheByPlatform[currentPlatform] = rulesArr;
    }

    await loadCuratedData();
    await loadWeeklyReport();
    updateCategoryTabCounts();
  } catch (e) {
    console.warn('External data load failed, using embedded defaults:', e);
    await loadCuratedData();
    await loadWeeklyReport();
    updateCategoryTabCounts();
  }
}

// === RULE DETAIL LINKS（公告/抓取链接须带 #/rule/detail，否则会落到规则首页）===
function normalizeRuleDetailLink(raw) {
  if (!raw || typeof raw !== 'string') return '';
  var s = raw.trim();
  if (!s) return '';
  if (s.indexOf('#/rule/detail') !== -1) return s;
  try {
    var u = new URL(s);
    var hostOk = clientRuleHosts.some(function (h) { return u.hostname.indexOf(h) !== -1; });
    if (!hostOk) return s;
    var isHk = u.hostname.indexOf('rule.tmall.hk') !== -1;
    var ruleId = u.searchParams.get('ruleId') || '';
    var cId = u.searchParams.get('cId') || '';
    if (!ruleId && u.hash) {
      var hashBody = u.hash.replace(/^#\/?/, '');
      var qIdx = hashBody.indexOf('?');
      var hashQuery = qIdx >= 0 ? hashBody.slice(qIdx + 1) : '';
      var hp = new URLSearchParams(hashQuery);
      ruleId = hp.get('ruleId') || ruleId;
      cId = hp.get('cId') || cId;
    }
    if (!ruleId) return s;
    var params = new URLSearchParams({ type: 'detail', ruleId: ruleId });
    if (cId) params.set('cId', cId);
    var qs = params.toString();
    if (isHk) return 'https://rule.tmall.hk/?' + qs;
    return 'https://rulechannel.tmall.com/?' + qs + '#/rule/detail?' + qs;
  } catch (e1) {
    return s;
  }
}

function formatCuratedDateTime(iso) {
  if (!iso) return '—';
  var t = new Date(iso);
  if (isNaN(t.getTime())) return '—';
  return t.toLocaleString('zh-CN', { hour12: false });
}

function getCuratedWatchEntry(sourceId) {
  if (!curatedWatchData || !curatedWatchData.sources) return null;
  return curatedWatchData.sources[sourceId] || null;
}

function curatedStatusLabel(status) {
  var map = { ok: '未变更', changed: '待同步', synced: '已自动更新', error: '检测失败' };
  return map[status] || status || '—';
}

function getCuratedSourceById(sourceId) {
  return (curatedSourcesData.sources || []).find(function (s) {
    return s.id === sourceId;
  });
}

function curatedSourceAppliesToCategory(sourceId, categoryKey) {
  if (!sourceId || !categoryKey) return false;
  var source = getCuratedSourceById(sourceId);
  return source && (source.categories || []).indexOf(categoryKey) >= 0;
}

function countChangedSourcesForCategory(categoryKey) {
  if (!curatedWatchData || !curatedWatchData.sources || !categoryKey) return 0;
  return (curatedSourcesData.sources || []).filter(function (s) {
    if ((s.categories || []).indexOf(categoryKey) < 0) return false;
    var w = curatedWatchData.sources[s.id];
    return w && w.status === 'changed';
  }).length;
}

function renderCuratedAlertBanner(categoryKey) {
  if (!curatedWatchData) return '';
  var isHome = categoryKey == null;
  var summary = curatedWatchData.summary || {};
  var changed = Number(summary.changed) || 0;
  var pub = curatedWatchData.recentAutoPublish;

  if (pub && pub.at) {
    if (!isHome && !curatedSourceAppliesToCategory(pub.sourceId, categoryKey)) {
      // fall through to changed check
    } else {
      return '<div class="curated-alert-banner synced">' +
        '引用规则已于 ' + escapeHtml(formatCuratedDateTime(pub.at)) + ' 自动同步展示（' +
        escapeHtml(pub.ruleTitle || pub.label || pub.sourceId || '') + '）。' +
        (curatedWatchData.lastCheckedAt ? ' 最近检测：' + escapeHtml(formatCuratedDateTime(curatedWatchData.lastCheckedAt)) + '。' : '') +
        '</div>';
    }
  }

  var changedCount = isHome
    ? changed
    : countChangedSourcesForCategory(categoryKey);
  if (changedCount > 0) {
    return '<div class="curated-alert-banner warning">' +
      '检测到 <strong>' + changedCount + '</strong> 条引用规则原文有更新，等待下次定时任务自动重写卡片与变更分析（或本地运行 <code>npm run sync:curated</code>）。' +
      ' 规则变更三栏解读需配置 <code>DEEPSEEK_API_KEY</code>（受 <code>LLM_MAX_INSIGHTS_PER_RUN</code> 预算限制）。' +
      '</div>';
  }
  return '';
}

function renderCuratedSourcesPanel(categoryKey) {
  var sources = (curatedSourcesData.sources || []).filter(function (s) {
    return (s.categories || []).indexOf(categoryKey) >= 0 && hasCuratedLink(s.url);

async function parseJsonFromResponse(res) {
  var text = await res.text();
  return JSON.parse(text.replace(/^\uFEFF/, ''));
}

function refreshCuratedTabIfActive() {

async function loadCuratedData() {
  var basePath = getDataBasePath() + getPlatformConfig().dataPrefix;
  try {
    var cardsRes = await fetch(basePath + 'curated-cards.json');
    if (cardsRes.ok) {
      applyCuratedCardsPayload(await parseJsonFromResponse(cardsRes));
    }
  } catch (e) {
    console.warn('curated-cards.json load failed:', e);
  }
  try {
    var srcRes = await fetch(basePath + 'curated-sources.json');
    if (srcRes.ok) {
      curatedSourcesData = await parseJsonFromResponse(srcRes);
    }
  } catch (e) {
    console.warn('curated-sources.json load failed:', e);
  }
  try {
    var watchRes = await fetch(basePath + 'curated-watch.json');
    if (watchRes.ok) {
      curatedWatchData = await parseJsonFromResponse(watchRes);
    }
  } catch (e) {
    console.warn('curated-watch.json load failed:', e);
  }
  try {
    var insightsRes = await fetch(basePath + 'curated-category-insights.json');
    if (insightsRes.ok) {
      curatedInsightsData = await parseJsonFromResponse(insightsRes);
    } else {
      console.warn('curated-category-insights.json HTTP', insightsRes.status);
    }
  } catch (e) {
    console.warn('curated-category-insights.json load failed:', e);
  }
  updateCategoryTabCounts();
  refreshCuratedTabIfActive();
}

function getFormalStageRowCell(row, field) {

    return row.definitionHtml || row.detailHtml || '';

}

function getFormalStageColumnSpecs(block) {
  var cols = block.columns || ['维度', '指标', '计算公式/说明'];
  var map = {
    '评分维度': { field: 'dimension', merge: true },
    '维度': { field: 'dimension', merge: Boolean(block.mergeDimension) },
    '细分指标': { field: 'metric' },
    '指标': { field: 'metric' },
    '指标定义': { field: 'definition' },
    '计算公式/说明': { field: 'definition' },
    '考核周期': { field: 'assessmentPeriod' }
  };
  return cols.map(function(label) {
    return { label: label, field: (map[label] || { field: 'definition' }).field, merge: (map[label] || {}).merge };
  });
}

function computeDimensionRowspans(rows, mergeDimension) {
  if (!mergeDimension) return null;
  var spans = new Array(rows.length);
  var i = 0;
  while (i < rows.length) {
    var dim = rows[i].dimension || '';
    var count = 1;
    while (i + count < rows.length && (rows[i + count].dimension || '') === dim) {
      count += 1;
    }
    spans[i] = count;
    for (var j = 1; j < count; j++) spans[i + j] = 0;
    i += count;
  }
  return spans;
}

  var html = '<div class="card-score-section">';
  html += '<p class="card-score-heading">' + (block.heading || '正式阶段考核指标') + '</p>';

    html += '<colgroup><col style="width:10%"><col style="width:12%"><col style="width:56%"><col style="width:22%"></colgroup>';
  }
  html += '<thead><tr>';
  colSpecs.forEach(function(spec) { html += '<th>' + spec.label + '</th>'; });
  html += '</tr></thead><tbody>';
  block.rows.forEach(function(row, rowIndex) {
    html += '<tr>';
    colSpecs.forEach(function(spec) {
      if (spec.merge && dimSpans) {
        if (dimSpans[rowIndex] === 0) return;
        var rs = dimSpans[rowIndex] > 1 ? ' rowspan="' + dimSpans[rowIndex] + '"' : '';
        html += '<td' + rs + '>' + (row.dimension || '') + '</td>';
        return;
      }
      var cellHtml = getFormalStageRowCell(row, spec.field);
      if (isDouyinRule && spec.field === 'definition') {
        html += '<td class="card-score-td-def"><div class="card-score-def-inner">' + cellHtml + '</div></td>';
      } else if (isDouyinRule && spec.field === 'assessmentPeriod') {
        html += '<td class="card-score-td-period">' + cellHtml + '</td>';
      } else if (isDouyinRule && spec.field === 'metric') {
        html += '<td class="card-score-td-metric">' + cellHtml + '</td>';
      } else {
        html += '<td>' + cellHtml + '</td>';
      }
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  if (block.footnoteHtml) {
    html += '<p class="card-score-footnote">' + block.footnoteHtml + '</p>';
  }
  html += '</div>';
  return html;
}

function renderSection(key) {
  const data = (RULES_DATA && RULES_DATA[key]) ? RULES_DATA[key] : getRulesDataFallback()[key];
  let html = '<div class="content-section active" id="section-' + key + '">' +
    '<div class="section-header">' +
      '<div class="section-tag">' + data.tag + '</div>' +
      '<h1 class="section-title">' + data.title + '</h1>' +
      '<p class="section-desc">' + data.desc + '</p>' +
    '</div>' +
    renderCuratedAlertBanner(key);
  if (key === 'score' && data.formalStageMetrics) {
    html += renderFormalStageMetricsTable(data.formalStageMetrics);
  }
  html += '<div class="rules-grid">';

  data.cards.forEach(function(card) {
    var showCardLink = card.link && !(currentPlatform === 'douyin' && key === 'shelf');
    html += '<div class="rule-card" data-search="' + card.title + ' ' + card.body.replace(/<[^>]*>/g, '') + '">' +
      '<div class="card-top"><div class="card-title">' + card.title + '</div>' +
      '<span class="severity-badge ' + card.severity + '">' + card.severityText + '</span></div>' +
      '<div class="card-body">' + card.body + '</div>' +
      '<div class="card-footer"><span class="date-badge">' + card.date + '</span>' +
      card.tags.map(function(t) { return '<span class="card-tag">' + t + '</span>'; }).join('') +
      (showCardLink ? '<a class="card-link" href="' + normalizeRuleDetailLink(card.link) + '" target="_blank" rel="noopener">查看原文 ↗</a>' : '') +
      '</div></div>';
  });
  html += '</div>';

  if (shouldShowCategoryInsights(key)) html += renderCategoryInsights(key);

  html += renderCuratedSourcesPanel(key);

  html += '</div>';
  return html;
}

// === INTERACTION ===
const mainContent = document.getElementById('mainContent');
let currentTab = 'home';

  // #region agent log
  fetch('http://127.0.0.1:7324/ingest/d2ee9fed-721c-4a42-8d2b-2114b8621b6e',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'3cfe71'},body:JSON.stringify({sessionId:'3cfe71',runId:runId||'pre-fix',hypothesisId:'H2-H5',location:'index.html:debugDouyinScoreDefColumn',message:'def column layout',data:{dataPath:getDataBasePath(),wrapClientW:wrap.clientWidth,tableClientW:table?table.clientWidth:0,tableScrollW:table?table.scrollWidth:0,tableWiderThanWrap:tableWiderThanWrap,tableMinWidth:tableCs?tableCs.minWidth:null,tableLayout:tableCs?tableCs.tableLayout:null,dataSnippets:dataSnippets,cells:cellMetrics},timestamp:Date.now()})}).catch(function(){});

function showTab(key) {
  currentTab = key;
  const searchVal = document.getElementById('searchInput').value.trim().toLowerCase();

  if (key === 'home') {
    mainContent.innerHTML = renderHome();
  } else if (key === 'weekly') {
    mainContent.innerHTML = renderWeekly();
  } else {
    mainContent.innerHTML = renderSection(key);
    if (searchVal) filterCards(searchVal);
  }
  if (key === 'score') {
    requestAnimationFrame(function() {
      requestAnimationFrame(function() { debugDouyinScoreDefColumn('pre-fix'); });
    });
  }

  document.querySelectorAll('.nav-tab').forEach(function(t) { t.classList.remove('active'); });
  var activeTab = document.querySelector('.nav-tab[data-tab="' + key + '"]');
  if (activeTab) activeTab.classList.add('active');

  if (typeof gsap !== 'undefined') {

    gsap.fromTo('.home-category-item', { opacity: 0, x: -12 }, { opacity: 1, x: 0, stagger: 0.06, duration: 0.35, ease: 'power2.out', delay: 0.2 });
    gsap.fromTo('.timeline-item', { opacity: 0, x: -10 }, { opacity: 1, x: 0, stagger: 0.08, duration: 0.3, ease: 'power2.out', delay: 0.4 });
    gsap.fromTo('.fetch-panel', { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.4, ease: 'power2.out', delay: 0.15 });
    gsap.fromTo('.rule-card', { opacity: 0, y: 20 }, { opacity: 1, y: 0, stagger: 0.06, duration: 0.4, ease: 'power2.out' });
    gsap.fromTo('.timeline-item', { opacity: 0, x: -10 }, { opacity: 1, x: 0, stagger: 0.08, duration: 0.3, ease: 'power2.out', delay: 0.3 });
    gsap.fromTo('.fetch-panel', { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.4, ease: 'power2.out' });
    var changePanels = document.querySelectorAll('.changes-panel');
    if (changePanels.length) {
      gsap.fromTo('.changes-panel', { opacity: 0, y: 15 }, { opacity: 1, y: 0, duration: 0.5, ease: 'power2.out', delay: 0.25 });

}

document.getElementById('navTabs').addEventListener('click', function(e) {
  const tab = e.target.closest('.nav-tab');
  if (tab) showTab(tab.dataset.tab);
});

function filterCards(query) {
  const cards = document.querySelectorAll('.rule-card');
  let visible = 0;
  cards.forEach(function(card) {
    const text = card.getAttribute('data-search').toLowerCase();
    if (text.includes(query)) { card.style.display = ''; visible++; }
    else { card.style.display = 'none'; }
  });
  let noRes = document.querySelector('.no-results');
  if (visible === 0 && !noRes) {
    const div = document.createElement('div');
    div.className = 'no-results';
    div.innerHTML = '<div class="no-results-icon">⌕</div><div class="no-results-text">未找到匹配的规则</div><div class="no-results-sub">尝试更换关键词或切换分类</div>';
    document.querySelector('.rules-grid').after(div);
  } else if (visible > 0 && noRes) { noRes.remove(); }
}

document.getElementById('searchInput').addEventListener('input', function(e) {
  const val = e.target.value.trim().toLowerCase();
  if (!val) { showTab(currentTab); return; }
  filterCards(val);
});

function setFetchActive(active) {
  var indicator = document.getElementById('fetchIndicator');
  var spinner = document.getElementById('fetchSpinner');
  var text = document.getElementById('fetchText');
  if (!indicator || !spinner || !text) return;
  if (active) {
    indicator.classList.remove('idle');
    spinner.classList.remove('idle');
    text.textContent = '正在抓取规则...';
  } else {
    indicator.classList.add('idle');
    spinner.classList.add('idle');
    var count = backendStatus ? backendStatus.fetchCount : 0;
    text.textContent = '规则自动抓取中 · 已执行' + count + '次';
  }
}

async function triggerManualFetch() {
  const btn = document.getElementById('manualFetchBtn');
  if (!btn) return;
  if (!isLocalDevHost()) {
    window.open(GITHUB_CRAWL_WORKFLOW_URL, '_blank', 'noopener,noreferrer');
    return;
  }
  btn.classList.add('loading');
  btn.textContent = '抓取中...';
  setFetchActive(true);
  try {
    const response = await fetch('/api/crawl', { method: 'POST' });
    if (!response.ok) throw new Error('crawl failed');
    const result = await response.json();

    backendStatus = Object.assign({}, backendStatus, {
      lastFetchTime: result.timestamp || new Date().toISOString(),
      fetchCount: typeof result.fetchCount === 'number' ? result.fetchCount : ((backendStatus && backendStatus.fetchCount) || 0) + 1,
      newRulesCount: typeof result.newRulesCount === 'number' ? result.newRulesCount : 0,
      totalRules: typeof result.stored === 'number' ? result.stored : backendStatus.totalRules
    });

    await loadExternalData();
    await loadWeeklyReport();
    showTab(currentTab);
    updateStatusBar();
    btn.textContent = '完成! +' + (result.newRulesCount || 0) + '条';
  } catch (e) {
    btn.textContent = '抓取失败';
  } finally {
    btn.classList.remove('loading');
    setFetchActive(false);
    setTimeout(function() {
      var b = document.getElementById('manualFetchBtn');
      if (b) b.textContent = '立即抓取';
    }, 3000);
  }
}

function updateStatusBar() {
  if (backendStatus && backendStatus.lastFetchTime) {
    var t = new Date(backendStatus.lastFetchTime);
    var pad = function(n) { return String(n).padStart(2, '0'); };
    var str = t.getFullYear() + '-' + pad(t.getMonth()+1) + '-' + pad(t.getDate()) + ' ' + pad(t.getHours()) + ':' + pad(t.getMinutes()) + ':' + pad(t.getSeconds());
    document.getElementById('statusTime').textContent = '最近抓取: ' + str;
  }
  var total = 0;
  Object.values(RULES_DATA).forEach(function(s) { total += s.cards.length; });
  var fetched = backendStatus ? backendStatus.totalRules : 0;
  document.getElementById('ruleCount').textContent = '已收录: ' + total + '条基础 + ' + fetched + '条抓取';
  setFetchActive(false);
}

function updateClock() {
  var now = new Date();
  var pad = function(n) { return String(n).padStart(2, '0'); };
  if (!backendStatus) {
    var str = now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate()) + ' ' + pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
    document.getElementById('statusTime').textContent = '当前时间: ' + str;
    var total = 0;
    Object.values(RULES_DATA).forEach(function(s) { total += s.cards.length; });
    document.getElementById('ruleCount').textContent = '已收录规则: ' + total + '条';
  }
}

// === PLATFORM SWITCH ===
function initPlatformFromStorage() {
  var saved = null;
  try {
    saved = localStorage.getItem(PLATFORM_STORAGE_KEY) || localStorage.getItem(PLATFORM_STORAGE_KEY_LEGACY);
  } catch (e) { /* ignore */ }
  if (saved && isPlatformEnabled(saved)) {
    currentPlatform = saved;
  } else {
    currentPlatform = 'tmall';
  }
  updatePlatformSelectUi();
}

function isPlatformPlanningLabel(entry) {
  return entry.planning === true || !entry.enabled;
}

function getPlatformOptionLabel(entry) {
  return isPlatformPlanningLabel(entry)
    ? entry.label + '（规划中）'
    : entry.label;
}

function renderPlatformSelect() {
  var sel = document.getElementById('platformSelect');
  if (!sel) return;
  sel.innerHTML = '';
  platformsManifestList.forEach(function (entry) {
    var opt = document.createElement('option');
    opt.value = entry.id;
    opt.textContent = getPlatformOptionLabel(entry);
    opt.disabled = !entry.enabled;
    sel.appendChild(opt);
  });
  if (!isPlatformEnabled(currentPlatform)) currentPlatform = 'tmall';
  sel.value = currentPlatform;
}

function updatePlatformSelectUi() {
  var sel = document.getElementById('platformSelect');
  if (sel && isPlatformEnabled(currentPlatform)) sel.value = currentPlatform;
  var cfg = getPlatformConfig();
  var logoSub = document.querySelector('.logo-sub');
  if (logoSub) logoSub.textContent = cfg.brandSubTitle || cfg.label;
}

function renderPlatformNavTabs() {
  var container = document.getElementById('navCategoryTabs');
  if (!container) return;
  var cfg = getPlatformConfig();
  var html = '';
  cfg.nav.forEach(function (item) {
    var count = (RULES_DATA && RULES_DATA[item.key] && RULES_DATA[item.key].cards)
      ? RULES_DATA[item.key].cards.length
      : 0;
    html += '<div class="nav-tab" data-tab="' + item.key + '">' +
      '<div class="tab-icon ' + item.iconClass + '">' + item.icon + '</div>' +
      '<span class="tab-label">' + escapeHtml(item.label) + '</span>' +
      '<span class="tab-count">' + count + '</span></div>';
  });
  container.innerHTML = html;
}

function updateCategoryTabCounts() {
  var cfg = getPlatformConfig();
  cfg.nav.forEach(function (item) {
    var tab = document.querySelector('.nav-tab[data-tab="' + item.key + '"]');
    if (!tab) return;
    var countEl = tab.querySelector('.tab-count');
    var count = (RULES_DATA && RULES_DATA[item.key] && RULES_DATA[item.key].cards)
      ? RULES_DATA[item.key].cards.length
      : 0;
    if (countEl) countEl.textContent = String(count);
  });
}

function initPlatformSwitch() {
  var sel = document.getElementById('platformSelect');
  if (!sel) return;
  sel.addEventListener('change', function () {
    switchPlatform(sel.value);
  });
}

async function switchPlatform(platform) {
  if (!isPlatformEnabled(platform)) return;
  if (platform === currentPlatform) return;
  currentPlatform = platform;
  try {
    localStorage.setItem(PLATFORM_STORAGE_KEY, platform);
  } catch (e) { /* ignore */ }
  updatePlatformSelectUi();
  applyCuratedCardsPayload(null);
  renderPlatformNavTabs();
  var keepTab = getCuratedCategoryKeys().indexOf(currentTab) >= 0 ||
    currentTab === 'home' ||
    currentTab === 'weekly';
  await loadCuratedData();
  await loadExternalData();
  updateStatusBar();
  showTab(keepTab ? currentTab : 'home');
}

// === THEME ===
var THEME_STORAGE_KEY = 'tmall-theme';

function getTheme() {
  var t = document.documentElement.getAttribute('data-theme');
  return t === 'light' ? 'light' : 'dark';
}

function updateThemeToggleLabel() {
  var btn = document.getElementById('themeToggleBtn');
  if (!btn) return;
  var isLight = getTheme() === 'light';
  btn.textContent = isLight ? '☀ 白天' : '🌙 黑夜';
  btn.setAttribute('aria-label', isLight ? '当前为白天模式，点击切换为黑夜' : '当前为黑夜模式，点击切换为白天');
}

function applyTheme(theme) {
  var next = theme === 'light' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  try {
    localStorage.setItem(THEME_STORAGE_KEY, next);
  } catch (e) { /* ignore */ }
  updateThemeToggleLabel();
}

function toggleTheme() {
  applyTheme(getTheme() === 'light' ? 'dark' : 'light');
}

function initThemeToggle() {
  updateThemeToggleLabel();
  var btn = document.getElementById('themeToggleBtn');
  if (btn) btn.addEventListener('click', toggleTheme);
}

// === DENSITY ===
var DENSITY_STORAGE_KEY = 'tmall-density';

function getDensity() {
  var d = document.documentElement.getAttribute('data-density');
  return d === 'compact' ? 'compact' : 'comfortable';
}

function updateDensityToggleLabel() {
  var btn = document.getElementById('densityToggleBtn');
  if (!btn) return;
  var isCompact = getDensity() === 'compact';
  btn.textContent = isCompact ? '紧凑' : '舒适';
  btn.setAttribute('aria-label', isCompact ? '当前为紧凑显示，点击切换为舒适' : '当前为舒适显示，点击切换为紧凑');
}

function applyDensity(density) {
  var next = density === 'compact' ? 'compact' : 'comfortable';
  document.documentElement.setAttribute('data-density', next);
  try {
    localStorage.setItem(DENSITY_STORAGE_KEY, next);
  } catch (e) { /* ignore */ }
  updateDensityToggleLabel();
}

function toggleDensity() {
  applyDensity(getDensity() === 'compact' ? 'comfortable' : 'compact');
}

function initDensityToggle() {
  updateDensityToggleLabel();
  var btn = document.getElementById('densityToggleBtn');
  if (btn) btn.addEventListener('click', toggleDensity);
}

// === BOOT ===
function bootComplete() {
  var overlay = document.getElementById('initOverlay');
  overlay.style.display = 'none';
  showTab('home');
  updateStatusBar();
  updateClock();
  setInterval(updateClock, 1000);
}

async function bootDataReady() {
  await loadPlatformsManifest();
  renderPlatformSelect();
  initPlatformFromStorage();
  renderPlatformNavTabs();
  return Promise.all([loadExternalData(), loadVisitStats()]);
}

function boot() {
  var fill = document.getElementById('initBarFill');
  var overlay = document.getElementById('initOverlay');
  var dataReady = bootDataReady();

  if (typeof gsap !== 'undefined') {
    gsap.to(fill, {
      width: '100%', duration: 1.2, ease: 'power2.inOut',
      onComplete: function() {
        dataReady.then(function() {
          gsap.to(overlay, {
            opacity: 0, duration: 0.4,
            onComplete: bootComplete
          });
        });
      }
    });
  } else {
    // GSAP not loaded — skip animation, show content immediately
    fill.style.width = '100%';
    dataReady.then(function() {
      setTimeout(function() {
        overlay.style.transition = 'opacity 0.3s';
        overlay.style.opacity = '0';
        setTimeout(bootComplete, 350);
      }, 400);
    });
  }
}

window.addEventListener('DOMContentLoaded', function () {
  initPlatformSwitch();
  initThemeToggle();
  initDensityToggle();
  boot();
});
